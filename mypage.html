<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - 대구마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e'
          }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-4 py-6 pb-24">
    <section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <div class="flex flex-col gap-5 sm:flex-row sm:items-center">
        
        <div id="profile-badge" class="flex h-16 w-16 flex-shrink-0 items-center justify-center rounded-full bg-green-100 text-xl font-bold text-green-700 shadow-sm">
          DU
        </div>
        
        <div class="flex flex-1 flex-col justify-center gap-2">
          
          <div class="flex flex-wrap items-center gap-2">
            <h1 id="user-name" class="text-2xl font-bold text-slate-900">불러오는 중...</h1>
            <span id="verify-badge" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600 shadow-sm">확인중</span>
            <span id="userClubBadge" class="hidden items-center gap-1 rounded-full border border-green-200 bg-green-50 px-2.5 py-1 text-xs font-bold text-green-700 shadow-sm"></span>
            <a href="account.html" class="ml-1 rounded-full border border-slate-200 px-3 py-1 text-xs font-medium text-slate-600 hover:bg-slate-50 transition-colors">계정 설정</a>
            <a id="adminReportsLink" href="admin-reports.html" class="hidden rounded-full border border-red-100 bg-red-50 px-3 py-1 text-xs font-semibold text-red-600 hover:bg-red-100 transition-colors">신고 관리</a>
          </div>
          
          <div class="flex flex-col text-sm text-slate-500 sm:flex-row sm:items-center sm:gap-3">
            <p id="user-department" class="font-medium"></p>
            <span class="hidden h-3 w-[1px] bg-slate-300 sm:block"></span> <p id="user-email"></p>
          </div>
          
        </div>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-3 border-t border-slate-100 pt-6 text-center sm:grid-cols-4">
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="selling-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">판매중</p>
        </div>
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="sold-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">판매완료</p>
        </div>
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="liked-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">관심목록</p>
        </div>
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="recent-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">최근 본 상품</p>
        </div>
      </div>
    </section>

    <section class="mt-6 rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <div class="grid grid-cols-2 gap-2 rounded-2xl bg-slate-100 p-1 sm:grid-cols-4">
        <button type="button" data-tab="selling" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">판매중</button>
        <button type="button" data-tab="sold" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">판매완료</button>
        <button type="button" data-tab="liked" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">관심목록</button>
        <button type="button" data-tab="recent" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">최근 본 상품</button>
      </div>

      <div id="tab-title" class="mt-5 text-sm font-semibold text-slate-500">판매중 상품</div>
      <div id="item-list" class="mt-4 space-y-3"></div>
      <div id="empty-state" class="hidden rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-6 py-10 text-center text-sm text-slate-500">
        표시할 항목이 없습니다.
      </div>
    </section>
    <div class="mt-6 grid grid-cols-2 gap-2">
      <a href="index.html" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
        메인으로
      </a>
      <a href="chat.html" class="rounded-2xl bg-primary px-4 py-3 text-center text-sm font-medium text-white hover:bg-green-600 transition-colors shadow-sm">
        채팅 내역
      </a>
      <a href="sell.html" class="rounded-2xl bg-primary px-4 py-3 text-center text-sm font-medium text-white hover:bg-green-600 transition-colors shadow-sm">
        판매 글 작성
      </a>
      <button id="inquiryButton" type="button" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
        문의하기
      </button>
    </div>
  </main>

  <div id="inquiryModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 px-4">
    <div class="w-full max-w-md rounded-3xl bg-white p-5 shadow-xl">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-bold text-slate-900">문의하기</h2>
          <p class="mt-1 text-sm text-slate-500">운영자가 확인할 수 있도록 내용을 남겨주세요.</p>
        </div>
        <button id="inquiryCloseButton" type="button" class="rounded-lg p-2 text-slate-400 hover:bg-slate-100 hover:text-slate-700" aria-label="문의 창 닫기">×</button>
      </div>

      <form id="inquiryForm" class="mt-5 space-y-4">
        <div>
          <label for="inquiryCategory" class="text-sm font-medium text-slate-700">문의 유형</label>
          <select id="inquiryCategory" class="mt-2 h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm">
            <option value="account">계정 문의</option>
            <option value="product">상품 문의</option>
            <option value="report">신고/제재 문의</option>
            <option value="chat">채팅 오류</option>
            <option value="other">기타</option>
          </select>
        </div>

        <div>
          <label for="inquiryMessage" class="text-sm font-medium text-slate-700">문의 내용</label>
          <textarea id="inquiryMessage" rows="5" maxlength="1000" class="mt-2 w-full resize-none rounded-xl border border-slate-200 px-3 py-2 text-sm focus:border-primary focus:outline-none" placeholder="문의 내용을 입력해주세요."></textarea>
        </div>

        <div class="flex justify-end gap-2">
          <button type="button" id="inquiryCancelButton" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium hover:bg-slate-50">취소</button>
          <button id="inquirySubmitButton" type="submit" class="rounded-xl bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-green-600 disabled:opacity-50">접수</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./mypage.js"></script>
</body>
</html>
