<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - 대구마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e'
          }
        }
      }
    };
  </script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-4xl px-4 py-6 pb-24">
    <section class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center">
        <div id="profile-badge" class="flex h-16 w-16 items-center justify-center rounded-full bg-green-100 text-xl font-bold text-green-700">
          DU
        </div>
        <div class="flex-1">
          <div class="flex items-center gap-2">
            <h1 id="user-name" class="text-2xl font-bold">불러오는 중...</h1>
            <span id="verify-badge" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">확인중</span>
          </div>
          <p id="user-department" class="mt-1 text-sm text-slate-500"></p>
          <p id="user-email" class="text-sm text-slate-500"></p>
        </div>
      </div>

      <div class="mt-6 grid grid-cols-3 gap-3 border-t border-slate-100 pt-6 text-center">
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="selling-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">판매중</p>
        </div>
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="sold-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">판매완료</p>
        </div>
        <div class="rounded-2xl bg-slate-50 p-4">
          <p id="liked-count" class="text-2xl font-bold">0</p>
          <p class="mt-1 text-sm text-slate-500">관심목록</p>
        </div>
      </div>
    </section>

    <section class="mt-6 rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <div class="grid grid-cols-3 gap-2 rounded-2xl bg-slate-100 p-1">
        <button type="button" data-tab="selling" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">판매중</button>
        <button type="button" data-tab="sold" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">판매완료</button>
        <button type="button" data-tab="liked" class="tab-trigger rounded-2xl px-4 py-2 text-sm font-medium text-slate-600">관심목록</button>
      </div>

      <div id="tab-title" class="mt-5 text-sm font-semibold text-slate-500">판매중 상품</div>
      <div id="item-list" class="mt-4 space-y-3"></div>
      <div id="empty-state" class="hidden rounded-2xl border border-dashed border-slate-200 bg-slate-50 px-6 py-10 text-center text-sm text-slate-500">
        표시할 항목이 없습니다.
      </div>
    </section>

    <div class="mt-6 flex gap-3">
      <a href="index.html" class="flex-1 rounded-2xl bg-primary px-4 py-3 text-center text-sm font-medium text-white">메인으로</a>
      <a href="account.html" class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-medium text-slate-700">계정 설정</a>
      <a href="sell.html" class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-medium text-slate-700">판매 글 작성</a>
    </div>
  </main>

  <script src="./mypage.js"></script>
</body>
</html>
