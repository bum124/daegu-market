<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캠퍼스 소식통 - 대구마켓</title>
  <meta name="description" content="대구대학교 전체 동아리 활동 소식 피드">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // index.html과 동일한 Tailwind 테마
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#22c55e",
            foreground: "#171717",
            background: "#fafafa",
            muted: "#f5f5f5",
            "muted-foreground": "#737373",
            card: "#ffffff",
            border: "#e5e5e5"
          }
        }
      }
    };
  </script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-background text-foreground antialiased">

  <!-- 1) 상단 헤더 -->
  <header class="sticky top-0 z-50 border-b border-border bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-3xl items-center justify-between px-4">
      <a href="club-main.html" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-border bg-white text-muted-foreground hover:bg-muted hover:text-foreground" aria-label="뒤로가기">
        ‹
      </a>

      <div class="min-w-0 flex-1 px-3 text-center">
        <h1 class="truncate text-base font-bold sm:text-lg">캠퍼스 소식통 📣</h1>
        <p class="hidden text-xs text-muted-foreground sm:block">대구대 전체 동아리 활동 피드</p>
      </div>

      <button type="button" onclick="handleWriteAccess()" class="inline-flex items-center justify-center rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white hover:bg-green-600">
        글쓰기
      </button>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-5 pb-24 md:pb-10">
    <div class="mb-5 rounded-xl bg-amber-50 p-4 border border-amber-100 flex items-start gap-3">
      <span class="text-lg">⚠️</span>
      <div class="text-xs sm:text-sm text-amber-800 leading-relaxed">
        <strong>데이터 최적화 안내:</strong> 캠퍼스 소식통의 게시글은 서버 용량 관리 및 최신 정보 유지를 위해 <strong>작성 후 6개월이 지나면 자동으로 삭제</strong>됩니다. 중요한 내용은 미리 확인 부탁드립니다!
      </div>
    </div>
    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
      <div class="flex gap-2 text-sm font-semibold text-foreground">
        <span class="rounded-full bg-primary px-3 py-1 text-white shadow-sm">전체 홍보</span>
      </div>
      <select id="sortSelect" class="cursor-pointer rounded-lg border border-border bg-white px-3 py-1.5 text-sm font-medium text-foreground outline-none focus:border-primary focus:ring-1 focus:ring-primary shadow-sm">
        <option value="desc">최신순 보기</option>
        <option value="asc">오래된 순 보기</option>
      </select>
    </div>

    <section id="feed" class="space-y-4">
      <p class="text-center text-sm text-muted-foreground py-10">캠퍼스 소식을 불러오는 중입니다...</p>
    </section>
  </main>

  <!-- 사진 크게 보기 모달 -->
  <div id="image-modal" class="fixed inset-0 z-[60] hidden">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative mx-auto flex h-full max-w-3xl items-center justify-center p-4">
      <div class="w-full overflow-hidden rounded-2xl bg-white shadow-xl">
        <div class="flex items-center justify-between border-b border-border px-4 py-3">
          <p class="text-sm font-semibold">사진 보기</p>
          <button type="button" id="modal-close" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-white text-muted-foreground hover:bg-muted hover:text-foreground" aria-label="닫기">
            ✕
          </button>
        </div>
        <div class="bg-black/5">
          <img id="modal-image" src="" alt="확대 이미지" class="max-h-[75vh] w-full object-contain">
        </div>
        <div class="flex items-center justify-between gap-3 px-4 py-3">
          <p class="text-xs text-muted-foreground">팁: 배경 또는 ESC를 눌러 닫을 수 있어요.</p>
          <span class="rounded-full bg-green-50 px-3 py-1 text-xs font-semibold text-green-700">#22c55e</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = "https://daegu-market-api.onrender.com";
    const feedContainer = document.getElementById('feed');
    const sortSelect = document.getElementById('sortSelect');
    let allPosts = []; // 서버에서 받아온 글들을 담아둘 바구니

    function getTimeAgo(dateString) {
      const now = new Date();
      const past = new Date(dateString);
      const diffMs = now - past;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 60) return `${diffMins || 1}분 전`;
      if (diffHours < 24) return `${diffHours}시간 전`;
      return `${diffDays}일 전`;
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadPosts();
    });

    async function loadPosts() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/club-posts`);
        if (!response.ok) throw new Error('불러오기 실패');
        allPosts = await response.json(); // 바구니에 담기
        
        renderPosts(); // 화면에 그리기!
      } catch (error) {
        console.error(error);
        feedContainer.innerHTML = '<p class="text-center text-sm text-red-500 py-10">소식을 불러오는데 실패했습니다.</p>';
      }
    }

    // 🌟 화면에 카드를 찍어내는 핵심 함수 (정렬 기능 포함!)
    function renderPosts() {
      if (allPosts.length === 0) {
        feedContainer.innerHTML = '<div class="rounded-2xl border border-dashed border-border bg-white p-10 text-center text-sm text-muted-foreground">아직 등록된 캠퍼스 소식이 없습니다.<br>가장 먼저 소식을 알려보세요!</div>';
        return;
      }

      // 정렬 방식(최신순/오래된순)에 따라 배열 순서 뒤집기
      const sortOrder = sortSelect.value;
      const sortedPosts = [...allPosts].sort((a, b) => {
        const dateA = new Date(a.created_at);
        const dateB = new Date(b.created_at);
        return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
      });

      feedContainer.innerHTML = sortedPosts.map(post => {
        // 🌟 핵심 로직: 사진이 없으면 HTML 덩어리 자체를 아예 빈칸으로 만듭니다!
        let imageHtml = '';
        if (post.images && post.images.length > 0) {
          imageHtml = `
            <button type="button" class="feed-image relative block w-full bg-black/5" data-open-image="${post.images[0]}" aria-label="사진 크게 보기">
              <img src="${post.images[0]}" alt="게시글 사진" class="h-72 w-full object-cover sm:h-96">
              <div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent opacity-0 transition group-hover:opacity-100"></div>
              <div class="pointer-events-none absolute bottom-3 right-3 inline-flex items-center gap-2 rounded-full bg-white/90 px-3 py-1 text-xs font-semibold text-foreground opacity-0 shadow-sm transition group-hover:opacity-100">
                <span aria-hidden="true">🔍</span> 크게 보기
              </div>
            </button>
          `;
        }

        return `
        <a href="club-post-detail.html?id=${post.post_id}" class="feed-card group block overflow-hidden rounded-2xl border border-border bg-white hover:bg-muted" data-category="${post.category}">
          <div class="flex items-center justify-between gap-3 p-4">
            <div class="flex min-w-0 items-center gap-3">
              <div class="h-10 w-10 flex-shrink-0 overflow-hidden rounded-full border border-border bg-background flex items-center justify-center text-xl">
                📣
              </div>
              <div class="min-w-0">
                <p class="truncate text-sm font-semibold">${post.club_name}</p>
                <p class="mt-0.5 text-xs text-muted-foreground">${getTimeAgo(post.created_at)}</p>
              </div>
            </div>
            <span class="rounded-full bg-green-50 px-3 py-1 text-xs font-semibold text-green-700">${post.category}</span>
          </div>

          ${imageHtml} <div class="p-4">
            <p class="text-base font-bold leading-snug">${post.title}</p>
            <p class="mt-2 line-clamp-3 text-sm text-muted-foreground">${post.content}</p>
          </div>

          <div class="flex items-center justify-end gap-3 border-t border-border px-4 py-3">
            <span class="text-sm font-medium text-muted-foreground">조회 ${post.views || 0}</span>
          </div>
        </a>
        `;
      }).join('');

      rebindEvents();
    }

    // 드롭다운 값이 바뀔 때마다 다시 그리기!
    sortSelect.addEventListener('change', renderPosts);

    // --- 모달 창 로직 (기존과 동일) ---
    const modal = document.getElementById("image-modal");
    const modalImage = document.getElementById("modal-image");
    const modalClose = document.getElementById("modal-close");

    function openModal(src) {
      modalImage.src = src;
      modal.classList.remove("hidden");
      document.body.classList.add("overflow-hidden");
    }

    function closeModal() {
      modal.classList.add("hidden");
      modalImage.src = "";
      document.body.classList.remove("overflow-hidden");
    }

    modalClose.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if (e.target === modal || e.target === modal.firstElementChild) closeModal();
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !modal.classList.contains("hidden")) closeModal();
    });

    function rebindEvents() {
      document.querySelectorAll("[data-open-image]").forEach((btn) => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          const src = btn.getAttribute("data-open-image");
          if (src) openModal(src);
        });
      });
    }

    function handleWriteAccess() {
      const userStr = localStorage.getItem("loggedInUser");
      if (!userStr) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.href = "login.html";
        return;
      }
      window.location.href = "club-write.html";
    }
  </script>
