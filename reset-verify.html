<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 인증 - 대구대 마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            'primary-foreground': '#ffffff',
            background: '#fafafa',
            foreground: '#171717',
            muted: '#f5f5f5',
            'muted-foreground': '#737373',
            border: '#e5e5e5',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-foreground font-sans">
  <div class="flex min-h-screen flex-col">
    <header class="flex h-14 items-center border-b border-border px-4">
      <a href="find-password.html" class="flex h-10 w-10 items-center justify-center rounded-lg hover:bg-muted transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
        <span class="sr-only">뒤로가기</span>
      </a>
      <h1 class="ml-2 text-lg font-semibold">비밀번호 재설정 인증</h1>
    </header>

    <main class="flex flex-1 flex-col items-center justify-center px-4">
      <div class="w-full max-w-sm space-y-8 text-center">
        <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-primary/10">
          <svg class="h-10 w-10 text-primary" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>

        <div>
          <h2 class="text-xl font-bold text-foreground">인증 코드를 입력해주세요</h2>
          <p class="mt-2 text-sm text-muted-foreground">
            <span id="userEmail"></span>로<br />
            6자리 인증 코드를 발송했습니다.
          </p>
        </div>

        <form id="verifyForm" class="space-y-6">
          <div class="flex justify-center gap-2">
            <input type="text" id="code-0" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
            <input type="text" id="code-1" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
            <input type="text" id="code-2" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
            <input type="text" id="code-3" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
            <input type="text" id="code-4" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
            <input type="text" id="code-5" maxlength="1" inputmode="numeric" class="h-14 w-12 rounded-lg border border-border bg-white text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
          </div>

          <button
            type="submit"
            id="submitBtn"
            disabled
            class="w-full h-10 rounded-lg bg-primary text-primary-foreground font-medium hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            인증 확인
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('verifyForm');
    const submitBtn = document.getElementById('submitBtn');
    const userEmailSpan = document.getElementById('userEmail');
    const inputs = [];

    // 전 화면(find-password.html)에서 저장해둔 이메일 불러오기
    const resetEmail = localStorage.getItem('resetEmail');
    if (resetEmail) {
        userEmailSpan.textContent = resetEmail;
    } else {
        alert('잘못된 접근입니다.');
        window.location.href = 'find-password.html';
    }

    // Initialize code inputs
    for (let i = 0; i < 6; i++) {
      inputs.push(document.getElementById(`code-${i}`));
    }

    function getFullCode() {
      return inputs.map(input => input.value).join('');
    }

    function updateSubmitButton() {
      const code = getFullCode();
      submitBtn.disabled = code.length !== 6;
    }

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        let value = e.target.value.replace(/[^0-9]/g, '');
        if (value.length > 1) value = value.slice(-1);
        e.target.value = value;
        
        if (value && index < 5) inputs[index + 1].focus();
        updateSubmitButton();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    // 폼 제출 시 서버와 통신
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const code = getFullCode();
      if (code.length !== 6) return;

      submitBtn.disabled = true;
      submitBtn.textContent = '인증 확인 중...';

      // 🚩 /api/verify-reset API 호출 (단순 채점)
      fetch('http://localhost:3000/api/verify-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            email: resetEmail, 
            code: code 
        })
      })
      .then(response => {
        if (!response.ok) return response.json().then(err => { throw new Error(err.message) });
        return response.json();
      })
      .then(data => {
        alert(data.message); // 인증 성공!
        // 🚩 인증을 통과했으니, 진짜 새 비밀번호를 치는 화면으로 이동!
        window.location.href = 'change-password.html'; 
      })
      .catch(error => {
        alert(error.message || '인증에 실패했습니다.');
        submitBtn.disabled = false;
        submitBtn.textContent = '인증 확인';
      });
    });

    inputs[0].focus();
  </script>
</body>
</html>
