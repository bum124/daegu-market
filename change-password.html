<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>새 비밀번호 설정 - 대구대 마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            'primary-foreground': '#ffffff',
            background: '#fafafa',
            foreground: '#171717',
            muted: '#f5f5f5',
            'muted-foreground': '#737373',
            border: '#e5e5e5',
            destructive: '#ef4444',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-foreground font-sans">
  <div class="flex min-h-screen flex-col">
    <header class="flex h-14 items-center border-b border-border px-4">
      <h1 class="mx-auto text-lg font-semibold">새 비밀번호 설정</h1>
    </header>

    <main class="flex flex-1 flex-col items-center px-4 py-8">
      <div class="w-full max-w-sm space-y-6">
        
        <div class="text-center">
          <h2 class="text-xl font-bold text-foreground">비밀번호 변경</h2>
          <p class="mt-2 text-sm text-muted-foreground">
            새롭게 사용할 비밀번호를 입력해주세요.
          </p>
        </div>

        <div id="errorAlert" class="hidden rounded-lg border border-destructive/50 bg-destructive/10 p-4">
          <div class="flex items-center gap-2 text-destructive">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
            <span id="errorMessage" class="text-sm"></span>
          </div>
        </div>

        <form id="changeForm" class="space-y-4">
          
          <div class="space-y-2">
            <label for="newPassword" class="text-sm font-medium">새 비밀번호</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                id="newPassword"
                type="password"
                placeholder="8자 이상 입력하세요"
                required
                class="w-full h-10 rounded-lg border border-border bg-white pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label for="confirmPassword" class="text-sm font-medium">새 비밀번호 확인</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                id="confirmPassword"
                type="password"
                placeholder="비밀번호를 다시 입력하세요"
                required
                class="w-full h-10 rounded-lg border border-border bg-white pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full h-10 rounded-lg bg-primary text-primary-foreground font-medium hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            비밀번호 변경하기
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('changeForm');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');

    // 이전 화면들에서 가져온 이메일 확인 (이게 없으면 비정상적인 접근임)
    const resetEmail = localStorage.getItem('resetEmail');
    if (!resetEmail) {
        alert('잘못된 접근입니다. 비밀번호 찾기를 처음부터 다시 진행해주세요.');
        window.location.href = 'find-password.html';
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('hidden');

      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      // 1. 방어 로직: 8자 이상인지, 두 비밀번호가 같은지 확인
      if (newPassword.length < 8) {
        showError('비밀번호는 8자 이상이어야 합니다.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showError('비밀번호가 일치하지 않습니다.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '변경 중...';

      // 2. 서버로 최종 변경 요청!
      fetch('https://daegu-market-api.onrender.com/api/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            email: resetEmail, 
            newPassword: newPassword 
        })
      })
      .then(response => {
        if (!response.ok) return response.json().then(err => { throw new Error(err.message) });
        return response.json();
      })
      .then(data => {
        alert(data.message); 
        // 3. 작업이 모두 끝났으니 메모증(localStorage)을 깨끗하게 청소해줍니다.
        localStorage.removeItem('resetEmail'); 
        window.location.href = 'login.html'; // 다시 로그인하러 가기!
      })
      .catch(error => {
        showError(error.message || '비밀번호 변경에 실패했습니다.');
        submitBtn.disabled = false;
        submitBtn.textContent = '비밀번호 변경하기';
      });
    });
  </script>
</body>
</html>
