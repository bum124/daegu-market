<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 - 대구대 마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            'primary-foreground': '#ffffff',
            background: '#fafafa',
            foreground: '#171717',
            muted: '#f5f5f5',
            'muted-foreground': '#737373',
            border: '#e5e5e5',
            destructive: '#ef4444',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-foreground font-sans">
  <div class="flex min-h-screen flex-col">
    <header class="flex h-14 items-center border-b border-border px-4">
      <a href="login.html" class="flex h-10 w-10 items-center justify-center rounded-lg hover:bg-muted transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
        <span class="sr-only">뒤로가기</span>
      </a>
      <h1 class="ml-2 text-lg font-semibold">비밀번호 찾기</h1>
    </header>

    <main class="flex flex-1 flex-col items-center px-4 py-8">
      <div class="w-full max-w-sm space-y-6">
        
        <div class="text-center">
          <h2 class="text-xl font-bold text-foreground">비밀번호 재설정</h2>
          <p class="mt-2 text-sm text-muted-foreground">
            가입 시 등록한 학번과 학교 이메일을 입력하시면<br>이메일로 인증번호를 보내드립니다.
          </p>
        </div>

        <div id="errorAlert" class="hidden rounded-lg border border-destructive/50 bg-destructive/10 p-4">
          <div class="flex items-center gap-2 text-destructive">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
            <span id="errorMessage" class="text-sm"></span>
          </div>
        </div>

        <form id="findForm" class="space-y-4">
          <div class="space-y-2">
            <label for="studentId" class="text-sm font-medium">학번</label>
            <div class="relative">
              <input
                id="studentId"
                type="text"
                placeholder="예: 20201234"
                required
                class="w-full h-10 rounded-lg border border-border bg-white px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label for="email" class="text-sm font-medium">학교 이메일</label>
            <div class="relative">
              <input
                id="email"
                type="email"
                placeholder="가입 시 등록한 이메일"
                required
                class="w-full h-10 rounded-lg border border-border bg-white px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
              />
            </div>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="w-full h-10 rounded-lg bg-primary text-primary-foreground font-medium hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            인증번호 받기
          </button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById('findForm');
    const studentIdInput = document.getElementById('studentId');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');

    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('hidden');

      const studentId = studentIdInput.value;
      const email = emailInput.value;

      submitBtn.disabled = true;
      submitBtn.textContent = '메일 발송 중...';

      fetch('http://localhost:3000/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: studentId, email: email })
      })
      .then(response => {
        if (!response.ok) return response.json().then(err => { throw new Error(err.message) });
        return response.json();
      })
      .then(data => {
        alert(data.message);
        // 다음 화면(인증번호 입력창)에서 쓸 수 있게 이메일을 잠깐 저장해둡니다.
        localStorage.setItem('resetEmail', email); 
        window.location.href = 'reset-verify.html'; // 인증번호 치는 화면으로 이동!
      })
      .catch(error => {
        showError(error.message || '서버와 연결할 수 없습니다.');
        submitBtn.disabled = false;
        submitBtn.textContent = '인증번호 받기';
      });
    });
  </script>
</body>
</html>
