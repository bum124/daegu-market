<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동아리 소식 - 대구마켓</title>
  <meta name="description" content="동아리 소식 상세 보기">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // index.html과 동일한 Tailwind 테마
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#22c55e",
            foreground: "#171717",
            background: "#fafafa",
            muted: "#f5f5f5",
            "muted-foreground": "#737373",
            card: "#ffffff",
            border: "#e5e5e5"
          }
        }
      }
    };
  </script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-background text-foreground antialiased">

  <!-- 1) 상단 네비게이션 -->
  <header class="sticky top-0 z-50 border-b border-border bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-3xl items-center justify-between px-4">
      <a href="club-board.html" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-border bg-white text-muted-foreground hover:bg-muted hover:text-foreground" aria-label="뒤로가기">
        ‹
      </a>
      <h1 class="truncate px-3 text-base font-bold sm:text-lg">동아리 소식</h1>
      <div class="h-10 w-10"></div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-5 pb-28 md:pb-10">
    <article class="overflow-hidden rounded-2xl border border-border bg-white">

      <!-- 2) 메인 콘텐츠(상단): 활동 사진 슬라이더 -->
      <div class="relative aspect-square bg-muted sm:aspect-[16/11]">
        <img id="mainImage" src="https://images.unsplash.com/photo-1520975922284-4b1804f65a18?auto=format&fit=crop&w=1200&q=80" alt="활동 사진" class="h-full w-full object-cover">

        <button onclick="prevImage()" class="absolute left-3 top-1/2 -translate-y-1/2 rounded-full bg-white/85 p-2 hover:bg-white transition-colors" aria-label="이전 이미지">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <button onclick="nextImage()" class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-white/85 p-2 hover:bg-white transition-colors" aria-label="다음 이미지">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </button>

        <div class="absolute bottom-4 left-1/2 flex -translate-x-1/2 gap-1.5" id="imageDots"></div>
      </div>

      <!-- 작성자 정보 -->
      <div class="border-b border-border p-4">
        <div class="flex items-center justify-between gap-3">
          <div class="flex min-w-0 items-center gap-3">
            <div class="h-11 w-11 flex-shrink-0 overflow-hidden rounded-full border border-border bg-background">
              <img id="clubLogo" src="https://api.dicebear.com/8.x/thumbs/svg?seed=Run" alt="동아리 로고" class="h-full w-full object-cover">
            </div>
            <div class="min-w-0">
              <p id="clubName" class="truncate text-sm font-semibold">대구대 러닝크루</p>
              <p id="createdAt" class="mt-0.5 text-xs text-muted-foreground">3일 전</p>
            </div>
          </div>
          <span class="inline-flex items-center rounded-full bg-green-50 px-3 py-1 text-xs font-semibold text-green-700">번개모임</span>
        </div>
      </div>

      <!-- 제목 & 본문 -->
      <div class="p-4 sm:p-6">
        <h2 id="postTitle" class="text-xl font-bold leading-tight sm:text-2xl">오늘 밤 9시, 잔디광장 3km 번개</h2>
        <div id="postBody" class="prose mt-4 max-w-none whitespace-pre-wrap text-sm leading-7 text-foreground/90 sm:text-base sm:leading-8">
오늘은 가볍게 3km만 달리고 스트레칭까지 하고 끝낼게요.

러닝이 처음인 분도 함께 걸어도 괜찮아요!
페이스는 맞춰드리고, 중간에 쉬는 타임도 충분히 잡습니다.

- 장소: 캠퍼스 잔디광장
- 시간: 21:00
- 준비물: 운동화, 물, 얇은 겉옷

끝나고 편의점 간단 뒷풀이도 선택이에요.
        </div>
      </div>

      <!-- 3) 하단 인터랙션(소통) -->
      <div class="border-t border-border p-4 sm:p-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex flex-wrap items-center gap-2">
            <button type="button" id="likeBtn" class="inline-flex items-center gap-2 rounded-lg border border-border bg-white px-4 py-2 text-sm font-semibold hover:bg-muted" aria-pressed="false">
              <span id="likeIcon" class="text-base" aria-hidden="true">♡</span>
              <span id="likeText">관심 54</span>
            </button>
            <button type="button" class="inline-flex items-center gap-2 rounded-lg border border-border bg-white px-4 py-2 text-sm font-semibold hover:bg-muted">
              <span aria-hidden="true">💬</span>
              <span>댓글 18</span>
            </button>
          </div>

          <a href="club-detail.html" class="inline-flex w-full items-center justify-center rounded-lg bg-primary px-6 py-3 text-base font-bold text-white shadow-sm hover:bg-green-600 sm:w-auto">
            이 동아리 정보 보기
          </a>
        </div>

        <div class="mt-4 rounded-xl border border-border bg-background p-4">
          <p class="text-sm font-semibold">댓글(데모)</p>
          <p class="mt-1 text-sm text-muted-foreground">
            실제 댓글 기능은 추후 연결할 수 있어요. 지금은 레이아웃만 구성했습니다.
          </p>
        </div>
      </div>
    </article>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    const API_BASE_URL = "https://daegu-market-api.onrender.com";

    // 🌟 시간 계산 도우미 (3일 전, 2시간 전 등)
    function getTimeAgo(dateString) {
      const now = new Date();
      const past = new Date(dateString);
      const diffMs = now - past;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 60) return `${diffMins || 1}분 전`;
      if (diffHours < 24) return `${diffHours}시간 전`;
      return `${diffDays}일 전`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!postId) {
        alert('잘못된 접근입니다.');
        window.location.href = 'club-board.html';
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/api/club-posts/${postId}`);
        if (!response.ok) throw new Error('게시글을 불러오지 못했습니다.');
        
        const post = await response.json();

        // 1. 진짜 데이터 꽂아넣기!
        document.getElementById('postTitle').textContent = post.title;
        document.getElementById('postBody').textContent = post.content;
        document.getElementById('clubName').textContent = post.club_name;
        document.getElementById('createdAt').textContent = getTimeAgo(post.created_at);
        document.getElementById('likeText').textContent = `관심 ${post.likes || 0}`;
        
        // 2. 카테고리 뱃지 글자 바꾸기
        const categoryBadge = document.querySelector('.bg-green-50.text-green-700');
        if (categoryBadge) categoryBadge.textContent = post.category;

        // 3. ✨ [핵심 디테일] 이 동아리 정보 보기 버튼을 누르면 해당 동아리 상세페이지로 이동!
        const clubLinkBtn = document.querySelector('a[href="club-detail.html"]');
        if (clubLinkBtn) {
          clubLinkBtn.href = `club-detail.html?id=${post.club_id}`;
        }

        // 4. 이미지 슬라이더 연동 (사진이 없으면 대구대 느낌의 기본 사진으로!)
        let imageArray = [];
        try {
          // DB에서 온 문자열을 자바스크립트 배열로 변환합니다.
          imageArray = typeof post.images === 'string' ? JSON.parse(post.images) : (post.images || []);
        } catch (e) {}

        // 변환된 사진이 있으면 슬라이더에 넣고, 없으면 기본 대구대 느낌 사진을 씁니다.
        window.images = imageArray.length > 0 
          ? imageArray 
          : ["https://images.unsplash.com/photo-1520975922284-4b1804f65a18?auto=format&fit=crop&w=1200&q=80"];
        
        window.currentIndex = 0;
        initGallery(); // 슬라이더 시작!

      } catch (error) {
        console.error(error);
        alert('게시글을 불러오는 중 오류가 발생했습니다.');
        window.location.href = 'club-board.html';
      }
    });

    // ===== 이하 기존 이미지 슬라이더 로직 =====
    window.currentIndex = 0;

    function updateImage() {
      if (!window.images || !window.images.length) return;
      document.getElementById("mainImage").src = window.images[window.currentIndex];

      const dots = document.getElementById("imageDots").children;
      for (let i = 0; i < dots.length; i++) {
        dots[i].className = i === window.currentIndex ? "h-2 w-2 rounded-full bg-primary" : "h-2 w-2 rounded-full bg-white/70";
      }
    }

    function prevImage() {
      if (!window.images || !window.images.length) return;
      window.currentIndex = window.currentIndex === 0 ? window.images.length - 1 : window.currentIndex - 1;
      updateImage();
    }

    function nextImage() {
      if (!window.images || !window.images.length) return;
      window.currentIndex = window.currentIndex === window.images.length - 1 ? 0 : window.currentIndex + 1;
      updateImage();
    }

    function goToImage(index) {
      window.currentIndex = index;
      updateImage();
    }

    function initGallery() {
      const dotsContainer = document.getElementById("imageDots");
      if(!dotsContainer) return;
      dotsContainer.innerHTML = "";
      if (!window.images) return;
      
      window.images.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = index === 0 ? "h-2 w-2 rounded-full bg-primary" : "h-2 w-2 rounded-full bg-white/70";
        dot.onclick = () => goToImage(index);
        dotsContainer.appendChild(dot);
      });
      updateImage();
    }

    // ===== 관심(좋아요) 토글 (데모) =====
    let liked = false;
    const likeBtn = document.getElementById("likeBtn");
    if(likeBtn) {
      likeBtn.addEventListener("click", () => {
        liked = !liked;
        likeBtn.setAttribute("aria-pressed", String(liked));
        document.getElementById("likeIcon").textContent = liked ? "♥" : "♡";
        likeBtn.classList.toggle("text-primary", liked);
        likeBtn.classList.toggle("border-green-200", liked);
        likeBtn.classList.toggle("bg-green-50", liked);
      });
    }
  </script>
</body>
</html>
