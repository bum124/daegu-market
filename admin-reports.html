<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신고 관리 - 대구대 마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl px-4 py-8">
    <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <a href="index.html" class="text-sm text-slate-500 hover:text-slate-900">메인으로</a>
        <h1 class="mt-2 text-2xl font-bold">운영 관리</h1>
        <p class="mt-1 text-sm text-slate-500">신고와 문의 접수 내용을 확인하고 관리자 조치를 저장합니다.</p>
      </div>
      <button id="refreshButton" class="rounded-lg bg-green-600 px-4 py-2 text-sm font-medium text-white hover:bg-green-700">새로고침</button>
    </div>

    <div class="mb-4 inline-grid grid-cols-2 rounded-xl bg-slate-100 p-1">
      <button type="button" data-admin-tab="reports" class="admin-tab rounded-lg px-4 py-2 text-sm font-medium">신고 관리</button>
      <button type="button" data-admin-tab="inquiries" class="admin-tab rounded-lg px-4 py-2 text-sm font-medium">문의 관리</button>
    </div>

    <div id="statusMessage" class="mb-4 hidden rounded-lg border px-4 py-3 text-sm"></div>
    <div id="reportList" class="space-y-3"></div>
    <div id="inquiryList" class="hidden space-y-3"></div>
  </main>

  <script>
    const API_BASE = 'https://daegu-market-api.onrender.com';
    const reasonLabels = {
      scam: '사기 의심',
      abuse: '욕설/비매너',
      no_show: '거래 파기',
      prohibited: '부적절한 상품',
      misleading: '상품 정보 불일치',
      external_trade: '외부 거래 유도',
      spam: '스팸/홍보',
      other: '기타'
    };
    const statusLabels = {
      pending: '대기',
      reviewed: '검토중',
      resolved: '처리완료',
      rejected: '기각'
    };
    const actionLabels = {
      none: '조치 없음',
      hide_product: '상품 숨김',
      show_product: '상품 공개',
      auto_hide_product: '자동 임시 숨김',
      warn_user: '사용자 경고',
      restrict_user: '사용자 제한',
      restore_user: '사용자 제한 해제'
    };
    const inquiryCategoryLabels = {
      account: '계정 문의',
      product: '상품 문의',
      report: '신고/제재 문의',
      chat: '채팅 오류',
      other: '기타'
    };
    const inquiryStatusLabels = {
      pending: '대기',
      reviewing: '확인중',
      answered: '답변완료',
      closed: '종료'
    };
    const ADMIN_EMAILS = ['qkrrjs0131@daegu.ac.kr', 'hye70301@daegu.ac.kr', 'bears0144@daegu.ac.kr'];
    let activeAdminTab = 'reports';

    function getLoggedInUser() {
      try {
        return JSON.parse(localStorage.getItem('loggedInUser') || 'null');
      } catch (error) {
        return null;
      }
    }

    function isAdminUser(email) {
      return ADMIN_EMAILS.includes(String(email || '').trim().toLowerCase());
    }

    // 로그인한 사용자 이메일이 관리자 목록에 있는지 확인합니다.
    function getAdminEmail() {
      const user = getLoggedInUser();
      const email = user && user.email;

      return isAdminUser(email) ? email : '';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showMessage(message, type = 'info') {
      const element = document.getElementById('statusMessage');
      const tone = type === 'error'
        ? 'border-red-200 bg-red-50 text-red-700'
        : 'border-green-200 bg-green-50 text-green-700';

      element.className = `mb-4 rounded-lg border px-4 py-3 text-sm ${tone}`;
      element.textContent = message;
      element.classList.remove('hidden');
    }

    function syncAdminTabs() {
      document.querySelectorAll('.admin-tab').forEach(button => {
        const active = button.dataset.adminTab === activeAdminTab;
        button.className = active
          ? 'admin-tab rounded-lg bg-white px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm'
          : 'admin-tab rounded-lg px-4 py-2 text-sm font-medium text-slate-500';
      });

      document.getElementById('reportList').classList.toggle('hidden', activeAdminTab !== 'reports');
      document.getElementById('inquiryList').classList.toggle('hidden', activeAdminTab !== 'inquiries');
    }

    function getTargetLabel(report) {
      if (report.target_type === 'product') {
        return `상품: ${report.target_product_title || `#${report.target_id}`}`;
      }

      if (report.target_type === 'user') {
        return `사용자: ${report.target_user_nickname || report.target_user_email || `#${report.target_id}`}`;
      }

      return `채팅: #${report.target_id}`;
    }

    function getTargetUrl(report) {
      if (report.target_type === 'product') {
        return `product.html?id=${encodeURIComponent(report.target_id)}`;
      }

      if (report.target_type === 'user') {
        return `profile.html?userId=${encodeURIComponent(report.target_id)}`;
      }

      if (report.target_type === 'chat') {
        return `chat_id.html?roomId=${encodeURIComponent(report.target_id)}`;
      }

      return '';
    }

    function getReportGuidance(report) {
      const activeCount = Number(report.target_active_report_count || 0);
      const seriousCount = Number(report.target_serious_report_count || 0);

      if (report.target_type === 'product') {
        if (activeCount >= 3 || seriousCount >= 2) {
          return {
            label: '상품 임시 숨김 기준 도달',
            detail: `누적 ${activeCount}건 · 심각 ${seriousCount}건`,
            className: 'border-red-100 bg-red-50 text-red-700'
          };
        }

        return {
          label: '상품 신고 검토',
          detail: `누적 ${activeCount}건 · 심각 ${seriousCount}건`,
          className: 'border-slate-200 bg-slate-50 text-slate-600'
        };
      }

      if (report.target_type === 'user') {
        if (seriousCount >= 2) {
          return {
            label: '사용자 제한 검토',
            detail: `사용자 신고 ${activeCount}건 · 심각 ${seriousCount}건`,
            className: 'border-red-100 bg-red-50 text-red-700'
          };
        }

        if (activeCount >= 3) {
          return {
            label: '사용자 경고 검토',
            detail: `사용자 신고 ${activeCount}건`,
            className: 'border-amber-100 bg-amber-50 text-amber-700'
          };
        }

        if (activeCount >= 2) {
          return {
            label: '관리자 확인 필요',
            detail: `사용자 신고 ${activeCount}건`,
            className: 'border-blue-100 bg-blue-50 text-blue-700'
          };
        }
      }

      return null;
    }

    // 서버에서 받은 신고 목록을 관리자용 카드와 처리 폼으로 렌더링합니다.
    function renderReports(reports) {
      const list = document.getElementById('reportList');

      if (!reports.length) {
        list.innerHTML = '<div class="rounded-xl border border-slate-200 bg-white p-8 text-center text-slate-500">접수된 신고가 없습니다.</div>';
        return;
      }

      list.innerHTML = reports.map(report => {
        const targetUrl = getTargetUrl(report);
        const targetLink = targetUrl
          ? `<a href="${targetUrl}" target="_blank" rel="noopener" class="text-slate-900 underline decoration-slate-300 underline-offset-4 hover:text-primary">${escapeHtml(getTargetLabel(report))}</a>`
          : escapeHtml(getTargetLabel(report));
        const guidance = getReportGuidance(report);

        return `
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
            <div>
              <div class="flex flex-wrap items-center gap-2">
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700">${statusLabels[report.status] || report.status}</span>
                <span class="rounded-full bg-red-50 px-2.5 py-1 text-xs font-medium text-red-700">${reasonLabels[report.reason] || report.reason}</span>
                <span class="text-xs text-slate-400">${new Date(report.created_at).toLocaleString('ko-KR')}</span>
              </div>
              <h2 class="mt-3 text-base font-semibold">${targetLink}</h2>
              ${guidance ? `
                <div class="mt-3 inline-flex flex-col rounded-xl border px-3 py-2 text-xs ${guidance.className}">
                  <span class="font-semibold">${guidance.label}</span>
                  <span class="mt-0.5">${guidance.detail}</span>
                </div>
              ` : ''}
              <p class="mt-1 text-sm text-slate-500">신고자: ${escapeHtml(report.reporter_nickname || report.reporter_email || `#${report.reporter_id}`)}</p>
              <p class="mt-3 whitespace-pre-wrap rounded-lg bg-slate-50 p-3 text-sm text-slate-600">${escapeHtml(report.detail || '상세 설명 없음')}</p>
            </div>
            <div class="grid min-w-full gap-2 sm:min-w-[360px] sm:grid-cols-3">
              <select data-status-id="${report.id}" class="rounded-lg border border-slate-200 px-3 py-2 text-sm">
                ${Object.entries(statusLabels).map(([value, label]) => `<option value="${value}" ${report.status === value ? 'selected' : ''}>${label}</option>`).join('')}
              </select>
              <select data-action-id="${report.id}" class="rounded-lg border border-slate-200 px-3 py-2 text-sm">
                ${Object.entries(actionLabels).map(([value, label]) => `<option value="${value}" ${(report.admin_action || 'none') === value ? 'selected' : ''}>${label}</option>`).join('')}
              </select>
              <button data-save-id="${report.id}" class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">저장</button>
            </div>
          </div>
        </article>
      `;
      }).join('');
    }

    function renderInquiries(inquiries) {
      const list = document.getElementById('inquiryList');

      if (!inquiries.length) {
        list.innerHTML = '<div class="rounded-xl border border-slate-200 bg-white p-8 text-center text-slate-500">접수된 문의가 없습니다.</div>';
        return;
      }

      list.innerHTML = inquiries.map(inquiry => `
        <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
            <div>
              <div class="flex flex-wrap items-center gap-2">
                <span class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700">${inquiryStatusLabels[inquiry.status] || inquiry.status}</span>
                <span class="rounded-full bg-green-50 px-2.5 py-1 text-xs font-medium text-green-700">${inquiryCategoryLabels[inquiry.category] || inquiry.category}</span>
                <span class="text-xs text-slate-400">${new Date(inquiry.created_at).toLocaleString('ko-KR')}</span>
              </div>
              <p class="mt-2 text-sm text-slate-500">문의자: ${escapeHtml(inquiry.user_nickname || inquiry.user_name || inquiry.user_email || `#${inquiry.user_id}`)}</p>
              <p class="mt-3 whitespace-pre-wrap rounded-lg bg-slate-50 p-3 text-sm text-slate-600">${escapeHtml(inquiry.message)}</p>
            </div>
            <div class="grid min-w-full gap-2 sm:min-w-[360px]">
              <select data-inquiry-status-id="${inquiry.id}" class="rounded-lg border border-slate-200 px-3 py-2 text-sm">
                ${Object.entries(inquiryStatusLabels).map(([value, label]) => `<option value="${value}" ${inquiry.status === value ? 'selected' : ''}>${label}</option>`).join('')}
              </select>
              <textarea data-inquiry-memo-id="${inquiry.id}" rows="3" class="resize-none rounded-lg border border-slate-200 px-3 py-2 text-sm" placeholder="관리자 메모">${escapeHtml(inquiry.admin_memo || '')}</textarea>
              <button data-inquiry-save-id="${inquiry.id}" class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700">저장</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    // 관리자 신고 목록 API를 호출해 reports 테이블의 신고 내역을 불러옵니다.
    async function loadReports() {
      const adminEmail = getAdminEmail();

      if (!adminEmail) {
        showMessage('신고 관리는 관리자 계정만 접근할 수 있습니다.', 'error');
        setTimeout(() => {
          window.location.href = 'mypage.html';
        }, 1200);
        return;
      }

      const response = await fetch(`${API_BASE}/api/admin/reports`, {
        headers: { 'x-admin-email': adminEmail }
      });
      const reports = await response.json().catch(() => []);

      if (!response.ok) {
        showMessage(reports.message || '신고 목록을 불러오지 못했습니다.', 'error');
        return;
      }

      renderReports(reports);
    }

    async function loadInquiries() {
      const adminEmail = getAdminEmail();

      if (!adminEmail) {
        showMessage('문의 관리는 관리자 계정만 접근할 수 있습니다.', 'error');
        return;
      }

      const response = await fetch(`${API_BASE}/api/admin/inquiries`, {
        headers: { 'x-admin-email': adminEmail }
      });
      const inquiries = await response.json().catch(() => []);

      if (!response.ok) {
        showMessage(inquiries.message || '문의 목록을 불러오지 못했습니다.', 'error');
        return;
      }

      renderInquiries(inquiries);
    }

    function loadActiveTab() {
      syncAdminTabs();
      if (activeAdminTab === 'reports') {
        loadReports();
        return;
      }
      loadInquiries();
    }

    document.getElementById('refreshButton').addEventListener('click', loadActiveTab);
    document.querySelectorAll('.admin-tab').forEach(button => {
      button.addEventListener('click', () => {
        activeAdminTab = button.dataset.adminTab;
        loadActiveTab();
      });
    });
    // 저장 버튼 클릭 시 선택한 상태와 조치를 서버에 업데이트합니다.
    document.getElementById('reportList').addEventListener('click', async event => {
      const button = event.target.closest('[data-save-id]');

      if (!button) {
        return;
      }

      const id = button.dataset.saveId;
      const adminEmail = getAdminEmail();
      const status = document.querySelector(`[data-status-id="${id}"]`).value;
      const adminAction = document.querySelector(`[data-action-id="${id}"]`).value;

      if (!adminEmail) {
        showMessage('신고 관리는 관리자 계정만 접근할 수 있습니다.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = '저장 중';

      const response = await fetch(`${API_BASE}/api/admin/reports/${encodeURIComponent(id)}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-email': adminEmail
        },
        body: JSON.stringify({
          status,
          admin_action: adminAction
        })
      });
      const result = await response.json().catch(() => ({}));

      button.disabled = false;
      button.textContent = '저장';

      if (!response.ok) {
        showMessage(result.message || '신고 처리 저장에 실패했습니다.', 'error');
        return;
      }

      showMessage('신고 처리가 저장되었습니다.');
      loadReports();
    });

    document.getElementById('inquiryList').addEventListener('click', async event => {
      const button = event.target.closest('[data-inquiry-save-id]');

      if (!button) {
        return;
      }

      const id = button.dataset.inquirySaveId;
      const adminEmail = getAdminEmail();
      const status = document.querySelector(`[data-inquiry-status-id="${id}"]`).value;
      const adminMemo = document.querySelector(`[data-inquiry-memo-id="${id}"]`).value;

      if (!adminEmail) {
        showMessage('문의 관리는 관리자 계정만 접근할 수 있습니다.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = '저장 중';

      const response = await fetch(`${API_BASE}/api/admin/inquiries/${encodeURIComponent(id)}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'x-admin-email': adminEmail
        },
        body: JSON.stringify({
          status,
          admin_memo: adminMemo
        })
      });
      const result = await response.json().catch(() => ({}));

      button.disabled = false;
      button.textContent = '저장';

      if (!response.ok) {
        showMessage(result.message || '문의 처리 저장에 실패했습니다.', 'error');
        return;
      }

      showMessage('문의 처리가 저장되었습니다.');
      loadInquiries();
    });

    loadActiveTab();
  </script>
</body>
</html>
