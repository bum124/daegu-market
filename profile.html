<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판매자 프로필 - 대구대마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#16a34a',
            'primary-foreground': '#ffffff',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .line-clamp-1 {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="sticky top-0 z-50 border-b border-gray-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4">
      <a href="index.html" class="flex items-center gap-2">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/>
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/>
            <path d="M2 7h20"/>
            <path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-primary">대구대마켓</span>
      </a>
      <a href="index.html" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100">목록으로</a>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <section class="rounded-xl border border-gray-200 bg-white p-5 md:p-6">
      <div id="profileLoading" class="py-12 text-center text-gray-500">판매자 정보를 불러오는 중입니다.</div>

      <div id="profileContent" class="hidden">
        <div class="flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-4">
            <div id="profileInitial" class="flex h-20 w-20 shrink-0 items-center justify-center rounded-full bg-primary/10 text-2xl font-bold text-primary">?</div>
            <div>
              <div class="flex flex-wrap items-center gap-2">
                <h1 id="profileName" class="text-2xl font-bold text-gray-900">판매자</h1>
                <span class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-1 text-xs font-medium text-green-700">학교 인증 완료</span>
              </div>
              <p id="profileDepartment" class="mt-1 text-sm text-gray-500">학과 정보 없음</p>
              <p id="profileEmail" class="mt-1 text-sm text-gray-500"></p>
              <p id="profileRisk" class="mt-2 inline-flex rounded-full bg-green-50 px-3 py-1 text-xs font-medium text-green-700">거래 신뢰도 확인 중</p>
              <div class="mt-4 flex flex-wrap gap-2">
                <button id="profileChatButton" onclick="openProfileChat()" class="inline-flex items-center justify-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-green-600">
                  채팅하기
                </button>
                <button id="profileReportButton" onclick="reportProfile()" class="inline-flex items-center justify-center rounded-lg border border-red-200 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50">
                  신고하기
                </button>
                <button id="profileReviewButton" onclick="openReviewModal()" class="hidden inline-flex items-center justify-center rounded-lg border border-amber-200 px-4 py-2 text-sm font-medium text-amber-700 hover:bg-amber-50">
                  신뢰도 평가
                </button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-4 gap-2 text-center md:w-[360px]">
            <div class="rounded-lg border border-gray-200 px-3 py-3">
              <p id="sellingCount" class="text-xl font-bold text-gray-900">0</p>
              <p class="mt-1 text-xs text-gray-500">판매중</p>
            </div>
            <div class="rounded-lg border border-gray-200 px-3 py-3">
              <p id="soldCount" class="text-xl font-bold text-gray-900">0</p>
              <p class="mt-1 text-xs text-gray-500">판매완료</p>
            </div>
            <div class="rounded-lg border border-gray-200 px-3 py-3">
              <p id="trustCount" class="text-xl font-bold text-gray-900">0</p>
              <p class="mt-1 text-xs text-gray-500">관심 합계</p>
            </div>
            <div class="rounded-lg border border-gray-200 px-3 py-3">
              <p id="reviewScore" class="text-xl font-bold text-gray-900">-</p>
              <p class="mt-1 text-xs text-gray-500">신뢰도</p>
            </div>
          </div>
        </div>

        <div id="reviewSummary" class="mt-5 hidden rounded-xl border border-amber-100 bg-amber-50/60 p-4">
          <div class="flex flex-wrap items-center gap-2">
            <p id="reviewSummaryText" class="text-sm font-semibold text-amber-900"></p>
            <div id="reviewTags" class="flex flex-wrap gap-2"></div>
          </div>
          <div id="reviewComments" class="mt-3 space-y-2"></div>
        </div>
      </div>
    </section>

    <section class="mt-6">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-900">등록한 상품</h2>
        <span id="productCountLabel" class="text-sm text-gray-500">0개</span>
      </div>

      <div id="productsLoading" class="rounded-xl border border-gray-200 bg-white py-12 text-center text-gray-500">상품을 불러오는 중입니다.</div>
      <div id="productGrid" class="hidden grid grid-cols-2 gap-4 md:grid-cols-4"></div>
      <div id="emptyProducts" class="hidden rounded-xl border border-gray-200 bg-white py-12 text-center text-gray-500">아직 등록한 상품이 없습니다.</div>
    </section>
  </main>

  <div id="toast" class="fixed right-4 top-4 z-[70] hidden rounded-lg border border-green-200 bg-white px-4 py-3 text-sm font-medium text-green-700 shadow-lg"></div>

  <div id="reportModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/40 px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-5 shadow-xl">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-bold text-gray-900">신고하기</h2>
          <p id="reportTargetLabel" class="mt-1 text-sm text-gray-500">관리자가 확인할 수 있도록 사유를 선택해주세요.</p>
        </div>
        <button type="button" onclick="closeReportModal()" class="rounded-lg p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-700" aria-label="신고 창 닫기">×</button>
      </div>

      <form id="reportForm" class="mt-5 space-y-4">
        <div class="grid grid-cols-2 gap-2">
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50">
            <input type="radio" name="reason" value="scam" class="mr-2" checked>사기 의심
          </label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50">
            <input type="radio" name="reason" value="abuse" class="mr-2">욕설/비매너
          </label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50">
            <input type="radio" name="reason" value="no_show" class="mr-2">거래 파기
          </label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50">
            <input type="radio" name="reason" value="spam" class="mr-2">스팸/홍보
          </label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50">
            <input type="radio" name="reason" value="other" class="mr-2">기타
          </label>
        </div>

        <div>
          <label for="reportDetail" class="text-sm font-medium text-gray-700">상세 내용</label>
          <textarea id="reportDetail" rows="4" class="mt-2 w-full resize-none rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-primary focus:outline-none" placeholder="상황을 간단히 적어주세요. 선택 입력입니다."></textarea>
        </div>

        <div class="flex justify-end gap-2">
          <button type="button" onclick="closeReportModal()" class="rounded-lg border border-gray-200 px-4 py-2 text-sm font-medium hover:bg-gray-50">취소</button>
          <button id="reportSubmitButton" type="submit" class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 disabled:opacity-50">신고 접수</button>
        </div>
      </form>
    </div>
  </div>

  <div id="reviewModal" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/40 px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-5 shadow-xl">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-lg font-bold text-gray-900">거래 신뢰도 평가</h2>
          <p id="reviewTargetLabel" class="mt-1 text-sm text-gray-500">거래 경험을 짧게 남겨주세요.</p>
        </div>
        <button type="button" onclick="closeReviewModal()" class="rounded-lg p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-700" aria-label="평가 창 닫기">×</button>
      </div>

      <form id="reviewForm" class="mt-5 space-y-4">
        <div>
          <p class="text-sm font-medium text-gray-700">하트 점수</p>
          <div id="ratingButtons" class="mt-2 flex gap-1">
            <button type="button" data-rating="1" class="rating-button text-3xl text-gray-300">♥</button>
            <button type="button" data-rating="2" class="rating-button text-3xl text-gray-300">♥</button>
            <button type="button" data-rating="3" class="rating-button text-3xl text-gray-300">♥</button>
            <button type="button" data-rating="4" class="rating-button text-3xl text-gray-300">♥</button>
            <button type="button" data-rating="5" class="rating-button text-3xl text-gray-300">♥</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="약속을 잘 지켜요" class="mr-2">약속을 잘 지켜요</label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="답장이 빨라요" class="mr-2">답장이 빨라요</label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="상품 설명이 정확해요" class="mr-2">상품 설명이 정확해요</label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="친절해요" class="mr-2">친절해요</label>
          <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="다시 거래하고 싶어요" class="mr-2">다시 거래하고 싶어요</label>
        </div>

        <div>
          <label for="reviewComment" class="text-sm font-medium text-gray-700">한 줄 평가</label>
          <textarea id="reviewComment" rows="3" maxlength="300" class="mt-2 w-full resize-none rounded-lg border border-gray-200 px-3 py-2 text-sm focus:border-primary focus:outline-none" placeholder="선택 입력입니다."></textarea>
        </div>

        <div class="flex justify-end gap-2">
          <button type="button" onclick="closeReviewModal()" class="rounded-lg border border-gray-200 px-4 py-2 text-sm font-medium hover:bg-gray-50">취소</button>
          <button id="reviewSubmitButton" type="submit" class="rounded-lg bg-amber-500 px-4 py-2 text-sm font-medium text-white hover:bg-amber-600 disabled:opacity-50">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = 'https://daegu-market-api.onrender.com';
    const API_TIMEOUT_MS = 12000;
    // URL의 userId로 조회할 판매자 프로필을 결정합니다.
    const params = new URLSearchParams(location.search);
    const userId = params.get('userId') || params.get('id');
    let loadedUser = null;
    let selectedRating = 5;

    async function fetchWithTimeout(url, options = {}, timeoutMs = API_TIMEOUT_MS) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function getLoggedInUser() {
      try {
        return JSON.parse(localStorage.getItem('loggedInUser') || 'null');
      } catch (error) {
        return null;
      }
    }

    function redirectToLogin(targetUrl) {
      window.location.href = `login.html?next=${encodeURIComponent(targetUrl || window.location.href)}`;
    }

    function parseImages(images) {
      if (Array.isArray(images)) {
        return images;
      }

      if (typeof images !== 'string' || !images.trim()) {
        return [];
      }

      try {
        const parsed = JSON.parse(images);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [images];
      }
    }

    function formatPrice(price) {
      return Number(price || 0).toLocaleString('ko-KR') + '원';
    }

    function getDisplayName(user) {
      return user.nickname || user.name || '판매자';
    }

    function getInitial(name) {
      return String(name || '?').trim().charAt(0) || '?';
    }

    function maskEmail(email) {
      if (!email || !email.includes('@')) {
        return '';
      }

      const [local, domain] = email.split('@');
      const visible = local.slice(0, 3);
      return `${visible}${local.length > 3 ? '***' : ''}@${domain}`;
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const tone = type === 'error'
        ? 'border-red-200 text-red-700'
        : 'border-green-200 text-green-700';

      toast.className = `fixed right-4 top-4 z-[70] rounded-lg border bg-white px-4 py-3 text-sm font-medium shadow-lg ${tone}`;
      toast.textContent = message;
      toast.classList.remove('hidden');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.add('hidden'), 2600);
    }

    function renderRatingButtons() {
      document.querySelectorAll('.rating-button').forEach(button => {
        const rating = Number(button.dataset.rating);
        button.classList.toggle('text-red-500', rating <= selectedRating);
        button.classList.toggle('text-gray-300', rating > selectedRating);
      });
    }

    function openReportModal() {
      const displayName = getDisplayName(loadedUser || {});
      document.getElementById('reportForm').reset();
      document.querySelector('input[name="reason"][value="scam"]').checked = true;
      document.getElementById('reportDetail').value = '';
      document.getElementById('reportTargetLabel').textContent = `${displayName}님 신고 사유를 선택해주세요.`;
      document.getElementById('reportModal').classList.remove('hidden');
      document.getElementById('reportModal').classList.add('flex');
    }

    function closeReportModal() {
      document.getElementById('reportModal').classList.add('hidden');
      document.getElementById('reportModal').classList.remove('flex');
    }

    function openReviewModal() {
      const user = getLoggedInUser();

      if (!user) {
        redirectToLogin(`profile.html?userId=${encodeURIComponent(userId || '')}`);
        return;
      }

      const currentUserId = user.user_id || user.id;

      if (currentUserId && String(currentUserId) === String(userId)) {
        alert('본인에게는 평가를 남길 수 없습니다.');
        return;
      }

      selectedRating = 5;
      document.getElementById('reviewForm').reset();
      document.getElementById('reviewTargetLabel').textContent = `${getDisplayName(loadedUser || {})}님과의 거래 경험을 남겨주세요.`;
      renderRatingButtons();
      document.getElementById('reviewModal').classList.remove('hidden');
      document.getElementById('reviewModal').classList.add('flex');
    }

    function closeReviewModal() {
      document.getElementById('reviewModal').classList.add('hidden');
      document.getElementById('reviewModal').classList.remove('flex');
    }

    // 사용자 신고 내용을 reports 테이블에 저장하도록 신고 API에 보냅니다.
    async function submitReport(payload) {
      const response = await fetchWithTimeout(`${API_BASE}/api/reports`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await response.json().catch(() => ({}));

      if (!response.ok) {
        showToast(result.message || '신고 접수에 실패했습니다.', 'error');
        return false;
      }

      showToast('신고가 접수되었습니다. 관리자가 확인할 예정입니다.');
      return true;
    }

    // 신고 이력을 기반으로 계산된 사용자 위험도를 배지로 표시합니다.
    function renderRiskBadge(risk) {
      const badge = document.getElementById('profileRisk');
      const level = risk && risk.risk_level ? risk.risk_level : '정상';
      const tone = level === '정상'
        ? 'bg-green-50 text-green-700'
        : level === '주의'
          ? 'bg-amber-50 text-amber-700'
          : 'bg-red-50 text-red-700';

      badge.className = `mt-2 inline-flex rounded-full px-3 py-1 text-xs font-medium ${tone}`;
      badge.textContent = `거래 신뢰도 ${level}`;
    }

    // 내 프로필이면 채팅/신고 버튼을 숨깁니다.
    function syncProfileActions() {
      const user = getLoggedInUser();
      const currentUserId = user && (user.user_id || user.id);
      const isMyProfile = currentUserId && userId && String(currentUserId) === String(userId);

      document.getElementById('profileReportButton').classList.toggle('hidden', Boolean(isMyProfile));
      document.getElementById('profileChatButton').classList.toggle('hidden', Boolean(isMyProfile));
      document.getElementById('profileReviewButton').classList.add('hidden');
    }

    function renderReviewSummary(reviewData) {
      const summary = document.getElementById('reviewSummary');
      const score = document.getElementById('reviewScore');

      if (!reviewData || !reviewData.review_count) {
        score.textContent = '-';
        summary.classList.add('hidden');
        return;
      }

      score.textContent = reviewData.average_rating.toFixed(1);
      document.getElementById('reviewSummaryText').textContent = `거래 신뢰도 ${reviewData.average_rating.toFixed(1)} / 5.0 · 평가 ${reviewData.review_count}개`;
      document.getElementById('reviewTags').innerHTML = (reviewData.top_tags || []).map(item => `
        <span class="rounded-full bg-white px-2.5 py-1 text-xs font-medium text-amber-800">${escapeHtml(item.tag)} ${item.count}</span>
      `).join('');
      document.getElementById('reviewComments').innerHTML = (reviewData.reviews || [])
        .filter(review => review.comment)
        .slice(0, 3)
        .map(review => `<p class="rounded-lg bg-white px-3 py-2 text-sm text-gray-600">${'♥'.repeat(review.rating)} ${escapeHtml(review.comment)}</p>`)
        .join('');
      summary.classList.remove('hidden');
    }

    function isSold(product) {
      return product.status === '판매완료' || product.condition === '판매완료';
    }

    // 판매자 기본 정보와 등록 상품을 프로필 화면에 표시합니다.
    function renderProfile(user, products) {
      loadedUser = user;
      const displayName = getDisplayName(user);
      const selling = products.filter(product => !isSold(product));
      const sold = products.filter(isSold);
      const totalLikes = products.reduce((sum, product) => sum + Number(product.likes || 0), 0);

      document.title = `${displayName} 프로필 - 대구대마켓`;
      document.getElementById('profileInitial').textContent = getInitial(displayName);
      document.getElementById('profileName').textContent = displayName;
      document.getElementById('profileDepartment').textContent = [user.college, user.department].filter(Boolean).join(' · ') || '학과 정보 없음';
      document.getElementById('profileEmail').textContent = maskEmail(user.email);
      document.getElementById('sellingCount').textContent = selling.length;
      document.getElementById('soldCount').textContent = sold.length;
      document.getElementById('trustCount').textContent = totalLikes;
      document.getElementById('profileLoading').classList.add('hidden');
      document.getElementById('profileContent').classList.remove('hidden');
      syncProfileActions();
    }

    // 판매자 프로필에서 바로 채팅방으로 이동합니다.
    function openProfileChat() {
      const user = getLoggedInUser();

      if (!user) {
        redirectToLogin(`profile.html?userId=${encodeURIComponent(userId || '')}`);
        return;
      }

      const currentUserId = user.user_id || user.id;

      if (currentUserId && String(currentUserId) === String(userId)) {
        alert('본인과는 채팅할 수 없습니다.');
        return;
      }

      window.location.href = `chat.html?sellerId=${encodeURIComponent(userId)}`;
    }

    // 로그인 여부와 본인 프로필 여부를 확인한 뒤 사용자 신고 모달을 엽니다.
    async function reportProfile() {
      const user = getLoggedInUser();

      if (!user) {
        redirectToLogin(`profile.html?userId=${encodeURIComponent(userId || '')}`);
        return;
      }

      openReportModal();
    }

    document.getElementById('reportModal').addEventListener('click', event => {
      if (event.target.id === 'reportModal') {
        closeReportModal();
      }
    });

    document.getElementById('reportForm').addEventListener('submit', async event => {
      event.preventDefault();

      const user = getLoggedInUser();

      if (!user) {
        closeReportModal();
        redirectToLogin(`profile.html?userId=${encodeURIComponent(userId || '')}`);
        return;
      }

      const submitButton = document.getElementById('reportSubmitButton');
      const reason = document.querySelector('input[name="reason"]:checked').value;
      const detail = document.getElementById('reportDetail').value.trim();
      submitButton.disabled = true;
      submitButton.textContent = '접수 중';

      const ok = await submitReport({
        reporter_id: user.user_id || user.id,
        reporter_email: user.email,
        target_type: 'user',
        target_id: userId,
        reason,
        detail
      });

      submitButton.disabled = false;
      submitButton.textContent = '신고 접수';

      if (ok) {
        closeReportModal();
      }
    });

    document.querySelectorAll('.rating-button').forEach(button => {
      button.addEventListener('click', () => {
        selectedRating = Number(button.dataset.rating);
        renderRatingButtons();
      });
    });

    document.getElementById('reviewModal').addEventListener('click', event => {
      if (event.target.id === 'reviewModal') {
        closeReviewModal();
      }
    });

    document.getElementById('reviewForm').addEventListener('submit', async event => {
      event.preventDefault();

      const user = getLoggedInUser();

      if (!user) {
        closeReviewModal();
        redirectToLogin(`profile.html?userId=${encodeURIComponent(userId || '')}`);
        return;
      }

      const submitButton = document.getElementById('reviewSubmitButton');
      const tags = Array.from(document.querySelectorAll('input[name="reviewTag"]:checked')).map(input => input.value);
      const comment = document.getElementById('reviewComment').value.trim();
      submitButton.disabled = true;
      submitButton.textContent = '저장 중';

      const response = await fetchWithTimeout(`${API_BASE}/api/reviews`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          reviewer_id: user.user_id || user.id,
          reviewer_email: user.email,
          target_user_id: userId,
          rating: selectedRating,
          tags,
          comment
        })
      });
      const result = await response.json().catch(() => ({}));

      submitButton.disabled = false;
      submitButton.textContent = '저장';

      if (!response.ok) {
        showToast(result.message || '거래 신뢰도 저장에 실패했습니다.', 'error');
        return;
      }

      closeReviewModal();
      showToast('거래 신뢰도 평가가 저장되었습니다.');
      loadProfile();
    });

    function createProductCard(product) {
      const images = parseImages(product.images);
      const image = images[0] || 'https://via.placeholder.com/400x400?text=Product';
      const title = product.title || '제목 없음';
      const status = isSold(product) ? '판매완료' : (product.condition || product.status || '판매중');
      const sold = isSold(product);

      const card = document.createElement('a');
      card.href = `product.html?id=${encodeURIComponent(product.id)}`;
      card.className = `group block overflow-hidden rounded-xl border border-gray-200 bg-white ${sold ? 'opacity-80' : ''}`;
      card.innerHTML = `
        <div class="relative aspect-square bg-gray-100">
          <img src="${escapeHtml(image)}" alt="${escapeHtml(title)}" class="h-full w-full object-cover transition-transform ${sold ? 'grayscale opacity-45' : 'group-hover:scale-105'}">
          ${sold ? '<div class="absolute inset-0 bg-white/50"></div><div class="absolute inset-0 flex items-center justify-center"><span class="rounded-full bg-slate-900/80 px-4 py-2 text-sm font-semibold text-white">판매완료</span></div>' : ''}
          <span class="absolute left-2 top-2 rounded-full px-2 py-1 text-xs font-medium ${sold ? 'bg-slate-900/80 text-white' : 'bg-white/90 text-gray-700'}">${escapeHtml(status)}</span>
        </div>
        <div class="p-3 ${sold ? 'text-slate-500' : ''}">
          <p class="line-clamp-1 text-sm font-medium text-gray-900">${escapeHtml(title)}</p>
          <p class="mt-1 font-bold text-gray-900">${formatPrice(product.price)}</p>
          <div class="mt-2 flex items-center justify-between text-xs text-gray-500">
            <span>조회 ${Number(product.views || 0)}</span>
            <span>관심 ${Number(product.likes || 0)}</span>
          </div>
        </div>
      `;

      return card;
    }

    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      const empty = document.getElementById('emptyProducts');

      document.getElementById('productsLoading').classList.add('hidden');
      document.getElementById('productCountLabel').textContent = `${products.length}개`;
      grid.innerHTML = '';

      if (!products.length) {
        empty.classList.remove('hidden');
        grid.classList.add('hidden');
        return;
      }

      products.forEach(product => grid.appendChild(createProductCard(product)));
      empty.classList.add('hidden');
      grid.classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('profileLoading').textContent = message;
      document.getElementById('productsLoading').classList.add('hidden');
      document.getElementById('emptyProducts').classList.remove('hidden');
    }

    // 판매자 정보, 상품 목록, 위험도 정보를 함께 불러옵니다.
    async function loadProfile() {
      if (!userId) {
        showError('판매자 정보가 없습니다.');
        return;
      }

      try {
        const [userResponse, productsResponse, riskResponse, reviewResponse] = await Promise.all([
          fetchWithTimeout(`${API_BASE}/api/users/${encodeURIComponent(userId)}`),
          fetchWithTimeout(`${API_BASE}/api/products`),
          fetchWithTimeout(`${API_BASE}/api/users/${encodeURIComponent(userId)}/risk`),
          fetchWithTimeout(`${API_BASE}/api/users/${encodeURIComponent(userId)}/reviews`)
        ]);

        if (!userResponse.ok) {
          showError('판매자를 찾을 수 없습니다.');
          return;
        }

        const user = await userResponse.json();
        const allProducts = productsResponse.ok ? await productsResponse.json() : [];
        const products = allProducts.filter(product => String(product.seller_id) === String(userId));
        const risk = riskResponse.ok ? await riskResponse.json() : null;
        const reviews = reviewResponse.ok ? await reviewResponse.json() : null;

        renderProfile(user, products);
        renderRiskBadge(risk);
        renderReviewSummary(reviews);
        renderProducts(products);
      } catch (error) {
        console.error('판매자 프로필 로딩 실패:', error);
        showError('판매자 정보를 불러오지 못했습니다.');
      }
    }

    loadProfile();
  </script>
</body>
</html>
