<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 상세</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://daegu-market-api.onrender.com/socket.io/socket.io.js"></script>

  <style>
    body { font-family: sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
  </style>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto h-screen flex flex-col bg-white">

  <header class="p-4 border-b flex justify-between items-center">
    <a href="chat.html">←</a>
    <div>채팅</div>
    <button id="leaveBtn" class="text-red-500 text-sm">나가기</button>
  </header>

  <!-- 상품 정보 -->
<a id="productInfo"
   class="hidden border-b p-3 flex items-center gap-3 bg-white"
>
  <img
    id="productImage"
    class="w-14 h-14 rounded-lg object-cover bg-gray-100"
  />

  <div class="flex-1 min-w-0">
    <div id="productTitle" class="font-semibold truncate"></div>

    <div class="text-sm text-gray-500 mt-1">
      <span id="productPrice"></span>
      ·
      <span id="productStatus"></span>
    </div>
  </div>
</a>

  <div id="dealStatusBox" class="hidden border-b bg-amber-50 px-4 py-3 text-sm text-amber-900">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
      <p id="dealStatusText">거래 상태를 확인하는 중입니다.</p>
      <button id="reviewBtn" type="button" class="hidden rounded-lg bg-amber-500 px-3 py-2 text-sm font-medium text-white">
        후기 작성
      </button>
    </div>
  </div>

  <div id="chatBody" class="flex-1 overflow-y-auto p-4 no-scrollbar"></div>

  <form class="p-3 border-t flex gap-2 items-center relative">

  <!-- + 버튼 -->
  <div class="relative">

    <button
      type="button"
      id="plusBtn"
      class="w-10 h-10 border border-gray-300 rounded text-xl flex items-center justify-center"
    >
      +
    </button>

    <!-- 메뉴 -->
    <div
      id="plusMenu"
      class="hidden absolute bottom-12 left-0 bg-white border rounded-xl shadow-md overflow-hidden min-w-[140px]"
    >

      <label
        for="imageInput"
        class="block px-4 py-3 text-sm hover:bg-gray-100 cursor-pointer"
      >
        사진 보내기
      </label>

      <button
        type="button"
        id="completeBtn"
        class="w-full text-left px-4 py-3 text-sm hover:bg-gray-100"
      >
        거래 완료
      </button>

    </div>

    <!-- 파일 -->
    <input
      type="file"
      id="imageInput"
      accept="image/*"
      class="hidden"
    />

  </div>

  <!-- 입력 -->
  <input
    id="msgInput"
    class="flex-1 border p-2 rounded"
    placeholder="메시지를 입력하세요"
  />

  <!-- 전송 -->
  <button
    class="bg-green-500 text-white px-4 h-10 rounded"
  >
    전송
  </button>

</form>

</div>

<!-- 거래 신뢰도 평가 모달 -->
<div
  id="reviewModal"
  class="hidden fixed inset-0 z-[999] bg-black/50 items-center justify-center p-4"
>
  <div class="w-full max-w-md rounded-2xl bg-white p-5 shadow-xl">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h2 class="text-lg font-bold text-gray-900">거래 신뢰도 평가</h2>
        <p class="mt-1 text-sm text-gray-500">거래가 완료된 상대에게만 후기를 남길 수 있습니다.</p>
      </div>
      <button type="button" onclick="closeReviewModal()" class="rounded-lg p-2 text-gray-400 hover:bg-gray-100">×</button>
    </div>

    <form id="reviewForm" class="mt-5 space-y-4">
      <div>
        <p class="text-sm font-medium text-gray-700">하트 점수</p>
        <div class="mt-2 flex gap-1">
          <button type="button" data-rating="1" class="rating-button text-3xl text-gray-300">♥</button>
          <button type="button" data-rating="2" class="rating-button text-3xl text-gray-300">♥</button>
          <button type="button" data-rating="3" class="rating-button text-3xl text-gray-300">♥</button>
          <button type="button" data-rating="4" class="rating-button text-3xl text-gray-300">♥</button>
          <button type="button" data-rating="5" class="rating-button text-3xl text-gray-300">♥</button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="약속을 잘 지켜요" class="mr-2">약속을 잘 지켜요</label>
        <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="답장이 빨라요" class="mr-2">답장이 빨라요</label>
        <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="상품 설명이 정확해요" class="mr-2">상품 설명이 정확해요</label>
        <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="친절해요" class="mr-2">친절해요</label>
        <label class="cursor-pointer rounded-lg border border-gray-200 px-3 py-2 text-sm hover:bg-gray-50"><input type="checkbox" name="reviewTag" value="다시 거래하고 싶어요" class="mr-2">다시 거래하고 싶어요</label>
      </div>

      <textarea id="reviewComment" rows="3" maxlength="300" class="w-full resize-none rounded-lg border border-gray-200 px-3 py-2 text-sm" placeholder="한 줄 평가는 선택입니다."></textarea>

      <div class="flex justify-end gap-2">
        <button type="button" onclick="closeReviewModal()" class="rounded-lg border border-gray-200 px-4 py-2 text-sm font-medium hover:bg-gray-50">취소</button>
        <button id="reviewSubmitButton" type="submit" class="rounded-lg bg-amber-500 px-4 py-2 text-sm font-medium text-white hover:bg-amber-600">저장</button>
      </div>
    </form>
  </div>
</div>

<!-- 이미지 확대 모달 -->
<div
  id="imageModal"
  class="hidden fixed inset-0 z-[999] bg-black/80 items-center justify-center p-4"
  onclick="closeImageModal()"
>
  <img
    id="modalImage"
    class="max-w-full max-h-full rounded-lg"
  />
</div>

<script>
const API_BASE = "https://daegu-market-api.onrender.com";
const socket = io(API_BASE);

const params = new URLSearchParams(location.search);
const roomId = params.get("room_id");
let currentDeal = null;
let currentProduct = null;
let selectedRating = 5;

const chatBody = document.getElementById("chatBody");
const form = document.querySelector("form");
const input = document.getElementById("msgInput");

async function loadProductInfo() {
  try {
    const res = await fetch(
      `${API_BASE}/chat/rooms/${roomId}/product`
    );

    const product = await res.json();

    if (!res.ok) return;
    currentProduct = product;

    const productInfo = document.getElementById("productInfo");
    const productImage = document.getElementById("productImage");
    const productTitle = document.getElementById("productTitle");
    const productPrice = document.getElementById("productPrice");
    const productStatus = document.getElementById("productStatus");

    productInfo.classList.remove("hidden");

    productTitle.textContent = product.title;
    productPrice.textContent =
      Number(product.price).toLocaleString() + "원";

    productStatus.textContent = product.status || "판매중";

    // 첫 번째 이미지 사용
    let images = [];

    try {
  images = JSON.parse(product.images || "[]");
  } catch (e) {
  images = [];
  }

 productImage.src =
  images[0] || "https://placehold.co/100x100?text=No+Image";

    // 상품 상세 페이지 이동
    productInfo.href = `product.html?id=${product.id}`;

  } catch (err) {
    console.log(err);
  }
}

let lastRenderedDate = "";

function getCurrentUser() {
  return (
    JSON.parse(localStorage.getItem("user")) ||
    JSON.parse(localStorage.getItem("loggedInUser"))
  );
}

function getCurrentUserId() {
  const user = getCurrentUser();
  return user ? (user.user_id || user.id) : null;
}

function renderRatingButtons() {
  document.querySelectorAll(".rating-button").forEach(button => {
    const rating = Number(button.dataset.rating);
    button.classList.toggle("text-red-500", rating <= selectedRating);
    button.classList.toggle("text-gray-300", rating > selectedRating);
  });
}

async function loadDealStatus() {
  const userId = getCurrentUserId();
  const statusBox = document.getElementById("dealStatusBox");
  const statusText = document.getElementById("dealStatusText");
  const reviewBtn = document.getElementById("reviewBtn");
  const completeBtn = document.getElementById("completeBtn");

  if (!userId || !roomId) return;

  try {
    const res = await fetch(`${API_BASE}/chat/rooms/${roomId}/deal?user_id=${encodeURIComponent(userId)}`);
    const data = await res.json();

    if (!res.ok) {
      statusBox.classList.add("hidden");
      return;
    }

    currentDeal = data;
    statusBox.classList.remove("hidden");

    if (data.is_completed) {
      statusText.textContent = data.has_reviewed
        ? "거래가 완료되었고 후기를 작성했습니다."
        : "거래가 완료되었습니다. 서로 후기를 작성할 수 있습니다.";
      completeBtn.textContent = "거래 완료됨";
      completeBtn.disabled = true;
      reviewBtn.classList.toggle("hidden", Boolean(data.has_reviewed));
      return;
    }

    reviewBtn.classList.add("hidden");
    completeBtn.disabled = Boolean(data.is_confirmed_by_me);
    completeBtn.textContent = data.is_confirmed_by_me ? "상대 확인 대기" : "거래 완료";
    statusText.textContent = data.is_confirmed_by_me
      ? "내 거래완료 확인이 저장되었습니다. 상대방 확인을 기다리는 중입니다."
      : "거래가 끝났다면 거래 완료를 눌러주세요. 양쪽 확인 후 후기를 작성할 수 있습니다.";
  } catch (error) {
    console.warn("거래 상태 로딩 실패:", error);
  }
}

async function confirmDeal() {
  const userId = getCurrentUserId();

  if (!userId) {
    alert("로그인이 필요합니다.");
    return;
  }

  if (!confirm("거래 완료로 확인할까요? 상대방도 확인하면 후기를 작성할 수 있습니다.")) {
    return;
  }

  const res = await fetch(`${API_BASE}/chat/rooms/${roomId}/deal/confirm`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: userId })
  });
  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.message || "거래완료 처리에 실패했습니다.");
    return;
  }

  alert(data.message || "거래완료 확인이 저장되었습니다.");
  loadProductInfo();
  loadDealStatus();
}

function openReviewModal() {
  if (!currentDeal || !currentDeal.is_completed) {
    alert("양쪽 거래완료 확인 후 후기를 작성할 수 있습니다.");
    return;
  }

  if (currentDeal.has_reviewed) {
    alert("이미 이 거래 후기를 작성했습니다.");
    return;
  }

  selectedRating = 5;
  document.getElementById("reviewForm").reset();
  renderRatingButtons();
  document.getElementById("reviewModal").classList.remove("hidden");
  document.getElementById("reviewModal").classList.add("flex");
}

function closeReviewModal() {
  document.getElementById("reviewModal").classList.add("hidden");
  document.getElementById("reviewModal").classList.remove("flex");
}

socket.on("connect", () => {
  console.log("소켓 연결됨:", socket.id);

  const userId = getCurrentUserId();

  if (!userId) {
    alert("로그인이 필요합니다.");
    return;
  }

  socket.emit("join_room", {
    roomId: roomId,
    userId: userId
  });
});

socket.on("connect_error", (err) => {
  console.log("소켓 연결 실패:", err.message);
});

socket.on("loadMessages", (messages) => {
  console.log("loadMessages 실행됨");

  chatBody.innerHTML = "";
  lastRenderedDate = "";

  messages.forEach(msg => {
    render(
      Number(msg.sender),
      msg.text,
      msg.created_at,
      msg.is_read
    );
  });

  setTimeout(() => {
    chatBody.scrollTop = chatBody.scrollHeight;
  }, 0);
});

socket.on("receive_message", (data) => {
  console.log("받은 메시지:", data);

  render(data.sender, data.text, new Date(), 0);

  // 상대 메시지면 즉시 읽음 처리
  if (Number(data.sender) !== Number(getCurrentUserId())) {
    socket.emit("mark_read", {
      roomId: roomId,
      userId: getCurrentUserId()
    });
  }
});

 socket.on("read_update", () => {
  console.log("읽음 상태 갱신됨");

  document.querySelectorAll(".unread-one").forEach(el => {
    el.remove();
  });
});

form.addEventListener("submit", (e) => {
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  const user = getCurrentUser();

  if (!user) {
    alert("로그인이 필요합니다");
    return;
  }

  socket.emit("send_message", {
    roomId: roomId,
    sender: user.user_id || user.id,
    text: text
  });

  input.value = "";
});

document.getElementById("leaveBtn").addEventListener("click", async () => {
  const user = getCurrentUser();

  if (!user) {
    alert("로그인이 필요합니다.");
    return;
  }

  if (!confirm("이 채팅방에서 나가시겠습니까?")) {
    return;
  }

  const res = await fetch(`https://daegu-market-api.onrender.com/chat/rooms/${roomId}/leave`, {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.user_id || user.id
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.message || "채팅방 나가기에 실패했습니다.");
    return;
  }

  alert("채팅방에서 나갔습니다.");
  window.location.href = "chat.html";
});

function renderDateDivider(createdAt) {
  if (!createdAt) return;

  const date = new Date(createdAt);
  const dateKey = date.toISOString().slice(0, 10);

  if (dateKey === lastRenderedDate) return;

  lastRenderedDate = dateKey;

  const divider = document.createElement("div");
  divider.className = "flex items-center gap-3 my-4 text-xs text-gray-400";

  divider.innerHTML = `
    <div class="flex-1 h-px bg-gray-200"></div>
    <div>
      ${date.toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric"
      })}
    </div>
    <div class="flex-1 h-px bg-gray-200"></div>
  `;

  chatBody.appendChild(divider);
}

function render(sender, text, createdAt, isRead) {
  renderDateDivider(createdAt);

  const user = getCurrentUser();
  const isMe = user && String(sender) === String(user.user_id || user.id);

  const isImage = typeof text === "string" && text.startsWith("http");

  const time = createdAt
    ? new Date(createdAt).toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit"
      })
    : "";

  const timeFront = time ? time.slice(0, -2) : "";
  const timeMinute = time ? time.slice(-2) : "";

  const div = document.createElement("div");
  div.className = `flex ${isMe ? "justify-end" : "justify-start"} mb-2`;

  div.innerHTML = `
    <div class="flex items-end max-w-[80%] ${
      isMe ? "flex-row-reverse" : ""
    }">

      <div class="${
        isImage
          ? ""
          : `px-3 py-2 rounded-2xl break-words ${
              isMe
                ? "bg-green-500 text-white rounded-br-md"
                : "bg-gray-200 text-gray-900 rounded-bl-md"
            }`
      }">
        ${
          isImage
            ? `
              <img
                src="${text}"
                onclick="openImageModal('${text}')"
                class="max-w-[220px] rounded-2xl border bg-white cursor-pointer"
              />
            `
            : text
        }
      </div>

      <div class="flex items-end shrink-0 whitespace-nowrap text-[10px] text-gray-400 leading-none mb-[2px] ${
        isMe ? "mr-[3px]" : "ml-[3px]"
      }">
        <span>${timeFront}</span>

        <span class="flex flex-col items-center leading-none">
          ${
            isMe && !isRead
              ? `<span class="unread-one text-[10px] leading-none mb-[3px]">1</span>`
              : ""
          }

          <span>${timeMinute}</span>
        </span>
      </div>

    </div>
  `;

  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

loadProductInfo();
loadDealStatus();

const plusBtn = document.getElementById("plusBtn");
const plusMenu = document.getElementById("plusMenu");

plusBtn.addEventListener("click", () => {
  plusMenu.classList.toggle("hidden");
});

const imageInput = document.getElementById("imageInput");

imageInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];

  if (!file) return;

  const formData = new FormData();
  formData.append("image", file);

  try {
    const res = await fetch(
      "https://daegu-market-api.onrender.com/upload/chat-image",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await res.json();

    if (!res.ok) {
      alert("이미지 업로드 실패");
      return;
    }

    const user = getCurrentUser();

    // 이미지 메시지 전송
    socket.emit("send_message", {
      roomId: roomId,
      sender: user.user_id || user.id,
      text: data.imageUrl,
      type: "image"
    });

  } catch (err) {
    console.log(err);
    alert("업로드 실패");
  }
});

document.getElementById("completeBtn").addEventListener("click", confirmDeal);
document.getElementById("reviewBtn").addEventListener("click", openReviewModal);

document.querySelectorAll(".rating-button").forEach(button => {
  button.addEventListener("click", () => {
    selectedRating = Number(button.dataset.rating);
    renderRatingButtons();
  });
});

document.getElementById("reviewForm").addEventListener("submit", async event => {
  event.preventDefault();

  const user = getCurrentUser();

  if (!user || !currentDeal || !currentDeal.other_user_id) {
    alert("후기 작성 정보를 확인하지 못했습니다.");
    return;
  }

  const submitButton = document.getElementById("reviewSubmitButton");
  const tags = Array.from(document.querySelectorAll('input[name="reviewTag"]:checked')).map(input => input.value);
  const comment = document.getElementById("reviewComment").value.trim();
  submitButton.disabled = true;
  submitButton.textContent = "저장 중";

  const res = await fetch(`${API_BASE}/api/reviews`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      room_id: roomId,
      product_id: currentDeal.product_id,
      reviewer_id: user.user_id || user.id,
      reviewer_email: user.email,
      target_user_id: currentDeal.other_user_id,
      rating: selectedRating,
      tags,
      comment
    })
  });
  const data = await res.json().catch(() => ({}));

  submitButton.disabled = false;
  submitButton.textContent = "저장";

  if (!res.ok) {
    alert(data.message || "후기 저장에 실패했습니다.");
    return;
  }

  alert("후기가 저장되었습니다.");
  closeReviewModal();
  loadDealStatus();
});

function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const modalImage = document.getElementById("modalImage");

  modal.classList.remove("hidden");
  modal.classList.add("flex");

  modalImage.src = src;
}

function closeImageModal() {
  const modal = document.getElementById("imageModal");

  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

</script>

</body>
</html>
