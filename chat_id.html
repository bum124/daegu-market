<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 상세 - 대구대 중고장터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#22c55e",
            foreground: "#171717",
            background: "#fafafa",
            muted: "#f5f5f5",
            "muted-foreground": "#737373",
            border: "#e5e5e5"
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    /* 스크롤바 숨기기 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-background text-foreground">

  <div id="chatShell" class="mx-auto flex h-screen max-w-2xl flex-col bg-white shadow-lg">
    <!-- Header -->
    <header class="sticky top-0 z-30 flex h-14 items-center justify-between border-b border-border bg-white/95 px-4 backdrop-blur">
      <div class="flex items-center gap-3">
        <a href="chat.html" class="rounded-full p-2 transition-colors hover:bg-muted" aria-label="뒤로가기">
          <i data-lucide="arrow-left" class="h-5 w-5 text-muted-foreground"></i>
        </a>
        <div class="flex items-center gap-3">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-muted text-sm font-bold text-muted-foreground">
            김
          </div>
          <span class="font-medium text-foreground">김철수</span>
        </div>
      </div>
      <button class="rounded-full p-2 transition-colors hover:bg-muted" aria-label="더보기">
        <i data-lucide="more-vertical" class="h-5 w-5 text-muted-foreground"></i>
      </button>
    </header>

    <!-- 2) 상단 정보 영역: 헤더 아래 sticky 고정 -->
    <div id="chatContextBar" class="sticky top-14 z-20 border-b border-border bg-white/95 px-4 py-3 backdrop-blur">
      <div class="flex items-start justify-between gap-3">
        <div class="flex min-w-0 items-start gap-3">
          <div id="contextThumbWrap" class="h-12 w-12 flex-shrink-0 overflow-hidden rounded-lg bg-muted">
            <img id="contextThumb" src="https://via.placeholder.com/120?text=Item" alt="컨텍스트" class="h-full w-full object-cover">
          </div>
          <div class="min-w-0">
            <div class="flex flex-wrap items-center gap-2">
              <span id="chatTypeBadge" class="inline-flex items-center rounded-full bg-gray-100 px-2.5 py-1 text-xs font-semibold text-gray-700">
                중고거래
              </span>
              <span class="text-xs text-muted-foreground">대화 정보</span>
            </div>
            <p id="contextTitle" class="mt-1 truncate text-sm font-semibold text-foreground">2024 맥북 에어 M3</p>
            <p id="contextSubtitle" class="mt-0.5 truncate text-xs text-muted-foreground">1,200,000원 · 상태 좋음</p>
          </div>
        </div>

        <button type="button" class="flex-shrink-0 rounded-lg border border-border bg-white px-3 py-2 text-xs font-semibold hover:bg-muted">
          보기
        </button>
      </div>
    </div>

    <!-- Messages -->
    <main id="chatBody" class="no-scrollbar flex-1 overflow-y-auto px-4 py-4">
      <div class="space-y-3">
        <div class="flex items-end gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-muted text-xs font-bold text-muted-foreground">김</div>
          <div class="max-w-[75%] rounded-2xl rounded-bl-md bg-muted px-4 py-3 text-sm text-foreground">
            안녕하세요! 아직 판매 중인가요?
          </div>
          <span class="text-[10px] text-muted-foreground">오후 2:28</span>
        </div>

        <div class="flex items-end justify-end gap-2">
          <span class="text-[10px] text-muted-foreground">오후 2:30</span>
          <div class="max-w-[75%] rounded-2xl rounded-br-md bg-primary px-4 py-3 text-sm font-medium text-white">
            네, 직거래 가능합니다! 정문 앞에서 뵐까요?
          </div>
        </div>

        <div class="flex items-center justify-center py-2">
          <span class="rounded-full bg-white/80 px-3 py-1 text-[11px] font-medium text-muted-foreground shadow-sm">오늘</span>
        </div>

        <div class="flex items-end gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-muted text-xs font-bold text-muted-foreground">김</div>
          <div class="max-w-[75%] rounded-2xl rounded-bl-md bg-muted px-4 py-3 text-sm text-foreground">
            좋아요! 7시 가능하신가요?
          </div>
          <span class="text-[10px] text-muted-foreground">오후 3:01</span>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="border-t border-border bg-white p-3">
      <form class="flex items-center gap-2">
        <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-border bg-white text-muted-foreground hover:bg-muted" aria-label="첨부">
          <i data-lucide="plus" class="h-5 w-5"></i>
        </button>
        <input type="text" placeholder="메시지를 입력하세요" class="h-10 flex-1 rounded-lg border border-border bg-white px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
        <button type="submit" class="inline-flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-semibold text-white hover:bg-green-600">
          전송
        </button>
      </form>
    </footer>
  </div>

  <script>
    lucide.createIcons();

    // type=club 이면 동아리 문의 UI로 전환(배경/배지/컨텍스트 영역)
    const params = new URLSearchParams(location.search);
    const type = params.get('type') || 'market'; // market | club

    const chatShell = document.getElementById('chatShell');
    const chatContextBar = document.getElementById('chatContextBar');
    const chatTypeBadge = document.getElementById('chatTypeBadge');
    const contextThumbWrap = document.getElementById('contextThumbWrap');
    const contextThumb = document.getElementById('contextThumb');
    const contextTitle = document.getElementById('contextTitle');
    const contextSubtitle = document.getElementById('contextSubtitle');

    function setMarketTheme() {
      // 중고: 깨끗한 흰색/연한 회색 유지
      document.body.classList.remove('bg-emerald-50');
      document.body.classList.add('bg-background');

      chatShell.classList.remove('ring-1', 'ring-emerald-100');

      chatTypeBadge.textContent = '중고거래';
      chatTypeBadge.className = 'inline-flex items-center rounded-full bg-gray-100 px-2.5 py-1 text-xs font-semibold text-gray-700';

      contextThumbWrap.className = 'h-12 w-12 flex-shrink-0 overflow-hidden rounded-lg bg-muted';
      contextThumb.src = 'https://via.placeholder.com/120?text=Item';
      contextThumb.alt = '상품 이미지';
      contextTitle.textContent = '2024 맥북 에어 M3';
      contextSubtitle.textContent = '1,200,000원 · 상태 좋음';

      chatContextBar.classList.remove('bg-emerald-50/95');
      chatContextBar.classList.add('bg-white/95');
    }

    function setClubTheme() {
      // 동아리: 민트/파스텔 톤으로 커뮤니티 느낌
      document.body.classList.remove('bg-background');
      document.body.classList.add('bg-emerald-50');

      chatShell.classList.add('ring-1', 'ring-emerald-100');

      chatTypeBadge.textContent = '동아리 문의';
      chatTypeBadge.className = 'inline-flex items-center rounded-full bg-green-50 px-2.5 py-1 text-xs font-semibold text-green-700';

      contextThumbWrap.className = 'h-12 w-12 flex-shrink-0 overflow-hidden rounded-full border border-border bg-white';
      contextThumb.src = 'https://api.dicebear.com/8.x/thumbs/svg?seed=Run';
      contextThumb.alt = '동아리 로고';
      contextTitle.textContent = '대구대 러닝크루';
      contextSubtitle.textContent = '회장에게 문의하기 · 답변이 빠를수록 좋아요';

      chatContextBar.classList.remove('bg-white/95');
      chatContextBar.classList.add('bg-emerald-50/95');
    }

    if (type === 'club') setClubTheme();
    else setMarketTheme();
  </script>
</body>
</html>
