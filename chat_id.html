<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 상세</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#22c55e",
            background: "#fafafa",
            muted: "#f5f5f5",
            border: "#e5e5e5"
          }
        }
      }
    };
  </script>

  <style>
    body { font-family: sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
  </style>
</head>

<body class="bg-background">

<div id="chatShell" class="max-w-2xl mx-auto h-screen flex flex-col bg-white">

  <!-- HEADER -->
  <header class="p-4 border-b flex justify-between">
    <a href="chat.html">←</a>
    <div>채팅</div>
    <div></div>
  </header>

  <!-- CONTEXT -->
  <div id="chatContextBar" class="p-3 border-b">
    <div id="chatTypeBadge">채팅</div>
  </div>

  <!-- CHAT -->
  <div id="chatBody" class="flex-1 overflow-y-auto p-4 no-scrollbar"></div>

  <!-- INPUT -->
  <form class="p-3 border-t flex gap-2">
    <input class="flex-1 border p-2 rounded" />
    <button class="bg-green-500 text-white px-4 rounded">전송</button>
  </form>

</div>

<script>
lucide.createIcons();

/* -------------------------
   URL
------------------------- */
const params = new URLSearchParams(location.search);
const roomId = params.get("room_id");
const type = params.get("type") || "market";

/* -------------------------
   DOM
------------------------- */
const chatBody = document.getElementById("chatBody");
const form = document.querySelector("form");
const input = document.querySelector("input");

/* -------------------------
   테마 (간단 유지)
------------------------- */
function setTheme() {
  const badge = document.getElementById("chatTypeBadge");

  if (type === "club") {
    badge.textContent = "동아리 문의";
  } else {
    badge.textContent = "중고거래";
  }
}
setTheme();

/* -------------------------
   메시지 로드
------------------------- */
let messages =
  JSON.parse(localStorage.getItem("chat_" + roomId)) || [];

messages.forEach(m => render(m.sender, m.text));

/* -------------------------
   메시지 전송
------------------------- */
form.addEventListener("submit", (e) => {
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  const msg = { sender: "나", text };

  render(msg.sender, msg.text);

  messages.push(msg);
  localStorage.setItem("chat_" + roomId, JSON.stringify(messages));

  /* 🔥 핵심: 안읽음 증가 (chat.html이 읽는 값) */
  localStorage.setItem(
    "chat_" + roomId + "_unread",
    Number(localStorage.getItem("chat_" + roomId + "_unread") || 0) + 1
  );

  input.value = "";
  chatBody.scrollTop = chatBody.scrollHeight;
});

/* -------------------------
   렌더
------------------------- */
function render(sender, text) {
  const isMe = sender === "나";

  const div = document.createElement("div");
  div.className = `flex ${isMe ? "justify-end" : "justify-start"} mb-2`;

  div.innerHTML = `
    <div class="px-3 py-2 rounded-lg ${
      isMe ? "bg-green-500 text-white" : "bg-gray-200"
    }">
      ${text}
    </div>
  `;

  chatBody.appendChild(div);
}

/* -------------------------
   입장 시 unread 초기화 (중요)
------------------------- */
localStorage.setItem("chat_" + roomId + "_unread", 0);

</script>

</body>
</html>
