<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 상세</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 소켓 -->
  <script src="https://daegu-market-api.onrender.com/socket.io/socket.io.js"></script>
  <style>
    body { font-family: sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display:none; }
  </style>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto h-screen flex flex-col bg-white">

  <!-- HEADER -->
  <header class="p-4 border-b flex justify-between items-center">
   <a href="chat.html">←</a>
   <div>채팅</div>
   <button id="leaveBtn" class="text-red-500 text-sm">
    나가기
   </button>
  </header>

  <!-- CHAT -->
  <div id="chatBody" class="flex-1 overflow-y-auto p-4 no-scrollbar"></div>

  <!-- INPUT -->
  <form class="p-3 border-t flex gap-2">
    <input id="msgInput" class="flex-1 border p-2 rounded" />
    <button class="bg-green-500 text-white px-4 rounded">전송</button>
  </form>

</div>

<script>
const socket = io("https://daegu-market-api.onrender.com");

socket.on("connect", () => {
  console.log("소켓 연결됨:", socket.id);
  socket.emit("join_room", roomId);
});

socket.on("connect_error", (err) => {
  console.log("소켓 연결 실패:", err.message);
});

/* -------------------------
   URL
------------------------- */
const params = new URLSearchParams(location.search);
const roomId = params.get("room_id");
console.log("roomId:", roomId);
console.log("roomId type:", typeof roomId, roomId);

/* -------------------------
   DOM
------------------------- */
const chatBody = document.getElementById("chatBody");
const form = document.querySelector("form");
const input = document.getElementById("msgInput");

/* -------------------------
   2. 방 입장
------------------------- */
socket.on("loadMessages", (messages) => {

  console.log("loadMessages 실행됨");

  chatBody.innerHTML = "";

  messages.forEach(msg => {
    render(Number(msg.sender), msg.text);
  });
});

/* -------------------------
   3. 메시지 받기
------------------------- */
socket.on("receive_message", (data) => {
   console.log("받은 메시지:", data);
  render(data.sender, data.text);
});


form.addEventListener("submit", (e) => {
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  const user =
    JSON.parse(localStorage.getItem("user")) ||
    JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("로그인이 필요합니다");
    return;
  }

 console.log("보내는 데이터:", {
  roomId: roomId,
  sender: user.user_id,
  text: text
  });

  socket.emit("send_message", {
    roomId: roomId,
    sender: user.user_id,
    text: text
  });

  input.value = "";
});

document.getElementById("leaveBtn").addEventListener("click", async () => {
  const user =
    JSON.parse(localStorage.getItem("user")) ||
    JSON.parse(localStorage.getItem("loggedInUser"));

  if (!user) {
    alert("로그인이 필요합니다.");
    return;
  }

  if (!confirm("이 채팅방에서 나가시겠습니까?")) {
    return;
  }

  const res = await fetch(`https://daegu-market-api.onrender.com/chat/rooms/${roomId}/leave`, {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user_id: user.user_id || user.id
    })
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok) {
    alert(data.message || "채팅방 나가기에 실패했습니다.");
    return;
  }

  alert("채팅방에서 나갔습니다.");
  window.location.href = "chat.html";
});

/* -------------------------
   5. 렌더
------------------------- */
function render(sender, text) {
  const user = JSON.parse(localStorage.getItem("loggedInUser"));

  const isMe = user && String(sender) === String(user.user_id || user.id);

  const div = document.createElement("div");
  div.className = `flex ${isMe ? "justify-end" : "justify-start"} mb-2`;

  div.innerHTML = `
    <div class="px-3 py-2 rounded-lg ${
      isMe ? "bg-green-500 text-white" : "bg-gray-200"
    }">
      ${text}
    </div>
  `;

  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}
</script>

</body>
</html>
