<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상품 등록 - 대구대 마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#16a34a',
            'primary-foreground': '#ffffff',
            background: '#fafafa',
            foreground: '#171717',
            card: '#ffffff',
            'card-foreground': '#171717',
            muted: '#f5f5f5',
            'muted-foreground': '#737373',
            border: '#e5e5e5',
            input: '#e5e5e5',
            destructive: '#dc2626',
            'destructive-foreground': '#ffffff',
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Helvetica Neue', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { font-family: 'Pretendard', sans-serif; }
    input:focus, textarea:focus, select:focus, button:focus {
      outline: 2px solid #16a34a;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="bg-background text-foreground min-h-screen">
  <!-- Mobile Header -->
  <header class="sticky top-0 z-40 flex h-14 items-center justify-between border-b border-border bg-white/95 backdrop-blur px-4 md:hidden">
    <a href="index.html" class="p-2 -ml-2 rounded-lg hover:bg-muted transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h1 class="text-lg font-semibold">상품 등록</h1>
    <div class="w-10"></div>
  </header>

  <!-- Main Content -->
  <main class="mx-auto max-w-2xl px-4 py-6 pb-24">
    <!-- Desktop Header -->
    <div class="hidden md:block mb-6">
      <a href="index.html" class="inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-colors mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        돌아가기
      </a>
      <h1 class="text-2xl font-bold text-foreground">상품 등록</h1>
      <p class="mt-1 text-muted-foreground">판매할 상품 정보를 입력해주세요.</p>
    </div>

    <form id="sellForm" class="space-y-6">
      <!-- Image Upload -->
      <div>
        <label class="text-sm font-medium">
          상품 이미지
          <span class="ml-1 text-destructive">*</span>
          <span class="ml-2 font-normal text-muted-foreground" id="imageCount">(0/10)</span>
        </label>
        <div class="mt-3 flex flex-wrap gap-3" id="imageContainer">
          <!-- Upload Button -->
          <label class="flex h-24 w-24 cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-border bg-muted/50 transition-colors hover:bg-muted">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-muted-foreground" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="mt-1 text-xs text-muted-foreground">사진 추가</span>
            <input type="file" accept="image/*" multiple id="imageInput" class="hidden">
          </label>
        </div>
        <p class="mt-2 text-sm text-destructive hidden" id="imageError">최소 1장의 사진을 등록해주세요.</p>
      </div>

      <!-- Title -->
      <div>
        <label for="title" class="text-sm font-medium">
          제목
          <span class="ml-1 text-destructive">*</span>
        </label>
        <input
          type="text"
          id="title"
          name="title"
          placeholder="상품 제목을 입력하세요"
          class="mt-2 w-full h-10 px-3 rounded-lg border border-input bg-white text-sm placeholder:text-muted-foreground focus:border-primary"
        >
        <p class="mt-1 text-sm text-destructive hidden" id="titleError">제목을 입력해주세요.</p>
      </div>

      <!-- Category & Condition -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="category" class="text-sm font-medium">
            카테고리
            <span class="ml-1 text-destructive">*</span>
          </label>
          <select
            id="category"
            name="category"
            class="mt-2 w-full h-10 px-3 rounded-lg border border-input bg-white text-sm focus:border-primary appearance-none cursor-pointer"
            style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23737373%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1rem;"
          >
            <option value="">선택</option>
            <option value="전자기기">전자기기</option>
            <option value="도서/문구">도서/문구</option>
            <option value="의류/잡화">의류/잡화</option>
            <option value="생활용품">생활용품</option>
            <option value="가구/인테리어">가구/인테리어</option>
            <option value="스포츠/레저">스포츠/레저</option>
            <option value="뷰티/미용">뷰티/미용</option>
            <option value="기타">기타</option>
          </select>
          <p class="mt-1 text-sm text-destructive hidden" id="categoryError">카테고리를 선택해주세요.</p>
        </div>

        <div>
          <label for="condition" class="text-sm font-medium">
            상품 상태
            <span class="ml-1 text-destructive">*</span>
          </label>
          <select
            id="condition"
            name="condition"
            class="mt-2 w-full h-10 px-3 rounded-lg border border-input bg-white text-sm focus:border-primary appearance-none cursor-pointer"
            style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23737373%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1rem;"
          >
            <option value="">선택</option>
            <option value="새상품">새상품</option>
            <option value="거의새것">거의 새것</option>
            <option value="사용감있음">사용감 있음</option>
            <option value="사용감많음">사용감 많음</option>
          </select>
          <p class="mt-1 text-sm text-destructive hidden" id="conditionError">상품 상태를 선택해주세요.</p>
        </div>
      </div>

      <!-- Price -->
      <div>
        <label for="price" class="text-sm font-medium">
          가격
          <span class="ml-1 text-destructive">*</span>
        </label>
        <div class="relative mt-2">
          <input
            type="text"
            id="price"
            name="price"
            inputmode="numeric"
            placeholder="0"
            class="w-full h-10 px-3 pr-8 rounded-lg border border-input bg-white text-sm placeholder:text-muted-foreground focus:border-primary"
          >
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground text-sm">원</span>
        </div>
        <p class="mt-1 text-sm text-destructive hidden" id="priceError">가격을 입력해주세요.</p>
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="text-sm font-medium">
          상품 설명
          <span class="ml-1 text-destructive">*</span>
        </label>
        <textarea
          id="description"
          name="description"
          placeholder="상품 상태, 구매 시기, 사용 기간 등을 자세히 적어주세요."
          class="mt-2 w-full min-h-[150px] px-3 py-2 rounded-lg border border-input bg-white text-sm placeholder:text-muted-foreground focus:border-primary resize-y"
        ></textarea>
        <p class="mt-1 text-sm text-destructive hidden" id="descriptionError">상품 설명을 입력해주세요.</p>
      </div>

      <!-- Location -->
      <div>
        <label for="location" class="text-sm font-medium">
          거래 희망 장소
          <span class="ml-1 text-destructive">*</span>
        </label>
        <div class="relative mt-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <select
            id="location"
            name="location"
            class="w-full h-10 pl-9 pr-8 rounded-lg border border-input bg-white text-sm focus:border-primary appearance-none cursor-pointer"
            style="background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23737373%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3e%3cpolyline points=%276 9 12 15 18 9%27%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 0.75rem center; background-size: 1rem;"
          >
            <option value="">거래 희망 장소를 선택하세요</option>
            <option value="중앙도서관 앞">중앙도서관 앞</option>
            <option value="학생회관">학생회관</option>
            <option value="정문">정문</option>
            <option value="후문">후문</option>
            <option value="기숙사 앞">기숙사 앞</option>
            <option value="체육관">체육관</option>
            <option value="공학관">공학관</option>
            <option value="경상관">경상관</option>
            <option value="예술대학">예술대학</option>
            <option value="대구역">대구역</option>
            <option value="기타 (협의)">기타 (협의)</option>
          </select>
        </div>
        <p class="mt-1 text-sm text-destructive hidden" id="locationError">거래 희망 장소를 선택해주세요.</p>
      </div>

      <!-- Notice -->
      <div class="flex gap-3 p-4 rounded-lg bg-muted border border-border">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-muted-foreground shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p class="text-sm text-muted-foreground">
          등록된 상품은 대구대학교 학생들에게만 공개됩니다.
          부적절한 상품은 관리자에 의해 삭제될 수 있습니다.
        </p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        id="submitBtn"
        class="w-full h-12 bg-primary text-primary-foreground font-medium rounded-lg hover:bg-primary/90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        상품 등록하기
      </button>
    </form>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 border-t border-border bg-white/95 backdrop-blur md:hidden">
    <div class="flex items-center justify-around py-2">
      <a href="index.html" class="flex flex-col items-center gap-1 px-3 py-2 text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-xs">홈</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1 px-3 py-2 text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <span class="text-xs">검색</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-primary-foreground">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
        </div>
        <span class="text-xs text-primary font-medium">판매</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1 px-3 py-2 text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span class="text-xs">채��</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1 px-3 py-2 text-muted-foreground">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="text-xs">마이</span>
      </a>
    </div>
  </nav>

  <script>
    // Image upload functionality
    const imageInput = document.getElementById('imageInput');
    const imageContainer = document.getElementById('imageContainer');
    const imageCount = document.getElementById('imageCount');
    let uploadedImages = [];

    imageInput.addEventListener('change', function(e) {
      const files = e.target.files;
      
      Array.from(files).forEach(file => {
        if (uploadedImages.length >= 10) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
          const imageUrl = e.target.result;
          uploadedImages.push(imageUrl);
          updateImagePreviews();
        };
        reader.readAsDataURL(file);
      });
      
      this.value = '';
    });

    function updateImagePreviews() {
      // Remove existing previews
      const previews = imageContainer.querySelectorAll('.image-preview');
      previews.forEach(p => p.remove());
      
      // Add new previews
      uploadedImages.forEach((imageUrl, index) => {
        const preview = document.createElement('div');
        preview.className = 'image-preview relative h-24 w-24';
        preview.innerHTML = `
          <img src="${imageUrl}" alt="Preview ${index + 1}" class="h-full w-full rounded-xl object-cover">
          <button type="button" onclick="removeImage(${index})" class="absolute -right-2 -top-2 rounded-full bg-destructive p-1 text-white hover:bg-red-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          ${index === 0 ? '<span class="absolute bottom-1 left-1 rounded bg-primary px-1.5 py-0.5 text-[10px] text-white">대표</span>' : ''}
        `;
        imageContainer.appendChild(preview);
      });
      
      imageCount.textContent = `(${uploadedImages.length}/10)`;
    }

    function removeImage(index) {
      uploadedImages.splice(index, 1);
      updateImagePreviews();
    }

    // Price formatting
    const priceInput = document.getElementById('price');
    priceInput.addEventListener('input', function(e) {
      let value = e.target.value.replace(/[^0-9]/g, '');
      if (value) {
        value = new Intl.NumberFormat('ko-KR').format(parseInt(value));
      }
      e.target.value = value;
    });

    // Form submission
    const form = document.getElementById('sellForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Reset errors
      document.querySelectorAll('.text-destructive').forEach(el => {
        if (el.id && el.id.includes('Error')) el.classList.add('hidden');
      });
      
      let hasError = false;
      
      // Validate
      if (uploadedImages.length === 0) {
        document.getElementById('imageError').classList.remove('hidden');
        hasError = true;
      }
      if (!document.getElementById('title').value.trim()) {
        document.getElementById('titleError').classList.remove('hidden');
        hasError = true;
      }
      if (!document.getElementById('category').value) {
        document.getElementById('categoryError').classList.remove('hidden');
        hasError = true;
      }
      if (!document.getElementById('condition').value) {
        document.getElementById('conditionError').classList.remove('hidden');
        hasError = true;
      }
      if (!priceInput.value || parseInt(priceInput.value.replace(/[^0-9]/g, '')) <= 0) {
        document.getElementById('priceError').classList.remove('hidden');
        hasError = true;
      }
      if (!document.getElementById('description').value.trim()) {
        document.getElementById('descriptionError').classList.remove('hidden');
        hasError = true;
      }
      if (!document.getElementById('location').value) {
        document.getElementById('locationError').classList.remove('hidden');
        hasError = true;
      }
      
      if (hasError) return;
      
      // 🌟 1. 로그인 검사 및 내 정보(판매자 id) 꺼내기
      const userStr = localStorage.getItem('loggedInUser');
      if (!userStr) {
        alert('로그인이 필요한 서비스입니다.');
        window.location.href = 'login.html';
        return;
      }
      const user = JSON.parse(userStr);

      // Submit 버튼 텍스트 변경
      submitBtn.disabled = true;
      submitBtn.textContent = '등록 중...';
      
      // 🌟 2. 서버로 보낼 진짜 데이터 포장 (seller_id 포함)
      const productData = {
        seller_id: user.user_id,
        title: document.getElementById('title').value,
        category: document.getElementById('category').value,
        condition: document.getElementById('condition').value,
        price: parseInt(priceInput.value.replace(/[^0-9]/g, '')),
        description: document.getElementById('description').value,
        location: document.getElementById('location').value,
        images: uploadedImages
      };

      // 🌟 3. 실제 서버로 데이터 쏘기
      fetch('https://daegu-market-api.onrender.com/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(productData)
      })
      .then(response => {
        if (!response.ok) throw new Error('서버 등록 에러');
        return response.json();
      })
      .then(data => {
        alert('상품이 성공적으로 등록되었습니다!');
        window.location.href = 'index.html';
      })
      .catch(error => {
        console.error(error);
        alert('상품 등록에 실패했습니다. 서버 상태를 확인해주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '상품 등록하기';
      });
    }); // 폼 제출 이벤트 끝나는 괄호
  </script>
</body>
</html>
