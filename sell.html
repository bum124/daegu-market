    // 카카오 지도 SDK를 필요한 순간에 불러옵니다. 실제 운영 전 JavaScript 키를 넣어야 합니다.
    function loadKakaoMapSdk() {
      if (window.kakao && window.kakao.maps) {
        return new Promise(resolve => window.kakao.maps.load(resolve));
      }

      if (!KAKAO_MAP_APP_KEY) {
        return Promise.reject(new Error('카카오 지도 JavaScript 키가 설정되지 않았습니다.'));
      }

      if (!kakaoMapLoader) {
        kakaoMapLoader = new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${encodeURIComponent(KAKAO_MAP_APP_KEY)}&libraries=services&autoload=false`;
          script.async = true;
          script.onload = () => window.kakao.maps.load(resolve);
          script.onerror = () => reject(new Error('카카오 지도를 불러오지 못했습니다.'));
          document.head.appendChild(script);
        });
      }

      return kakaoMapLoader;
    }

    async function getAddressFromCoordinate(lat, lng) {
      return new Promise(resolve => {
        if (!(window.kakao && window.kakao.maps && window.kakao.maps.services)) {
          resolve('지도 선택 위치');
          return;
        }

        const geocoder = new kakao.maps.services.Geocoder();

        geocoder.coord2Address(lng, lat, (result, status) => {
          if (status !== kakao.maps.services.Status.OK || !result[0]) {
            resolve('지도 선택 위치');
            return;
          }

          const address = result[0].road_address?.address_name || result[0].address?.address_name;
          resolve(address || '지도 선택 위치');
        });
      });
    }

    async function resolveLocationLabel(lat, lng) {
      // 카카오 장소 검색은 캠퍼스 건물을 엉뚱하게 매칭할 수 있어, 지금은 주소 변환 결과를 우선 사용합니다.
      return getAddressFromCoordinate(lat, lng);
    }

    // 지도에서 선택한 거래 장소 좌표와 표시 문구를 폼에 저장합니다.
    async function setSelectedLocation(lat, lng) {
      locationLatInput.value = String(lat);
      locationLngInput.value = String(lng);
      locationInput.value = '지도 선택 위치';
      locationMapText.textContent = '선택 위치를 확인하는 중입니다.';

      if (!locationMap || !(window.kakao && window.kakao.maps)) {
        return;
      }

      const position = new kakao.maps.LatLng(lat, lng);

      if (!locationMarker) {
        locationMarker = new kakao.maps.Marker({ position });
        locationMarker.setMap(locationMap);
      } else {
        locationMarker.setPosition(position);
      }

      const locationLabel = await resolveLocationLabel(lat, lng);
      locationInput.value = locationLabel;
      locationMapText.textContent = `선택 위치: ${locationLabel}`;
    }

    function setFallbackLocation() {
      locationInput.value = '기타 (협의)';
      locationLatInput.value = '';
      locationLngInput.value = '';
      locationMapText.textContent = '정확한 거래 장소는 채팅으로 협의해 주세요.';

      if (locationMarker) {

      }

    async function initializeLocationMap() {
      try {
        await loadKakaoMapSdk();

        const center = new kakao.maps.LatLng(daeguUniversityCenter[0], daeguUniversityCenter[1]);
        locationMap = new kakao.maps.Map(document.getElementById('locationMap'), {
          center,

        kakao.maps.event.addListener(locationMap, 'click', mouseEvent => {
          const latlng = mouseEvent.latLng;
          setSelectedLocation(latlng.getLat(), latlng.getLng());
        });

        setTimeout(() => locationMap.relayout(), 200);
      } catch (error) {
        console.warn('카카오 지도 초기화 실패:', error);
        locationMapText.textContent = '카카오 지도 API 키 설정 후 지도 선택을 사용할 수 있습니다. 지금은 기타(협의)를 선택해주세요.';

    imageInput.addEventListener('change', function(e) {
  const files = e.target.files;
  
  // 리사이징 할 최대 해상도 설정 (이 정도면 화면이나 AI 분석용으로 충분합니다)
  const MAX_WIDTH = 800;
  const MAX_HEIGHT = 800;

  Array.from(files).forEach(file => {
    if (uploadedImages.length >= 10) return;
    
    const reader = new FileReader();
    reader.onload = function(event) {
      // 1. 이미지를 메모리에 로드
      const img = new Image();
      img.onload = function() {
        let width = img.width;
        let height = img.height;

        // 2. 가로/세로 비율을 유지하면서 크기 계산
        if (width > height) {
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
        } else {
          if (height > MAX_HEIGHT) {
            width *= MAX_HEIGHT / height;
            height = MAX_HEIGHT;
          }
        }

        // 3. 캔버스를 생성하고 계산된 크기로 이미지 그리기
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // 4. 용량이 확 줄어든 이미지로 변환 (JPEG 포맷, 품질 70% 설정)
        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

        // 5. 배열에 추가하고 화면에 반영
        uploadedImages.push(compressedBase64);
        updateImagePreviews();
      };
      img.src = event.target.result;
    };
    // 원본 데이터를 읽어서 img 태그의 src로 넘겨줌
    reader.readAsDataURL(file);
  });
  
  this.value = '';
});

          <button type="button" onclick="removeImage(${index})" class="absolute -right-2 -top-2 rounded-full bg-destructive p-1 text-white hover:bg-red-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          ${index === 0 ? '<span class="absolute bottom-1 left-1 rounded bg-primary px-1.5 py-0.5 text-[10px] text-white">대표</span>' : ''}

        imageContainer.appendChild(preview);

      if (!user.email) {
        return null;
      }

      const response = await fetch(`${API_BASE_URL}/api/users`);

      if (!response.ok) {

      const matchedUser = users.find(item => item.email === user.email);

      return matchedUser ? matchedUser.user_id : null;

      // 🌟 1. 로그인 검사 및 내 정보(판매자 id) 꺼내기
      const userStr = localStorage.getItem('loggedInUser');

        return;
      }
      
      // 🌟 2. 서버로 보낼 진짜 데이터 포장 (seller_id 포함)
      const productData = {
        seller_id: sellerId,

        const imageBase64 = uploadedImages.length > 0 ? uploadedImages[0] : null;

        const response = await fetch(`${API_BASE_URL}/api/ai-recommend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, imageBase64 })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || 'AI 추천 실패');
        }

        const categorySelect = document.getElementById('category');
            for (let i = 0; i < categorySelect.options.length; i++) {
  if (categorySelect.options[i].value === data.category) {
    categorySelect.selectedIndex = i;
    break;
  }
}

if (data.minPrice && data.maxPrice) {
  // 최소~최대 가격의 평균값을 기본으로 세팅해줍니다.
        const suggestedPrice = Math.floor((data.minPrice + data.maxPrice) / 2);
        const priceInput = document.getElementById('price');
        priceInput.value = new Intl.NumberFormat('ko-KR').format(suggestedPrice);
  
          // 사용자에게는 분석 이유와 가격 범위를 친절하게 보여줍니다.
          alert(`✨ AI 사진 분석 완료!\n\n💡 분석 결과: ${data.reason}\n📊 추천 가격대: ${new Intl.NumberFormat('ko-KR').format(data.minPrice)}원 ~ ${new Intl.NumberFormat('ko-KR').format(data.maxPrice)}원\n\n(평균가인 ${new Intl.NumberFormat('ko-KR').format(suggestedPrice)}원이 자동 입력되었습니다.)`);
         }
      } catch (error) {
        console.error(error);
        alert('AI 분석 중 서버 오류가 발생했습니다. 잠시 후 시도해주세요.');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    populateTargetCollegeOptions();
    initializeLocationMap();
    setEditModeHeader();
    loadProductForEdit();
  </script>
</body>
</html>
