<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 목록</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            background: '#fafafa',
            foreground: '#171717',
            muted: '#f5f5f5',
            border: '#e5e5e5'
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: sans-serif; }
  </style>
</head>

<body class="bg-background">

<div class="max-w-2xl mx-auto bg-white min-h-screen">

  <!-- 탭 -->
  <div class="flex border-b">
    <button class="tab px-4 py-3" data-type="all">전체</button>
    <button class="tab px-4 py-3" data-type="market">중고</button>
    <button class="tab px-4 py-3" data-type="club">동아리</button>
  </div>

  <!-- 리스트 -->
  <div id="list"></div>

</div>

<script>

/* -------------------------
   서버에서 채팅 목록 가져오기
------------------------- */
function loadChatList() {
  fetch("http://localhost:3000/api/chat-list")
    .then(res => res.json())
    .then(data => {
      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(chat => {
        const div = document.createElement("a");

        div.href = `chat_id.html?room_id=${chat.room_id}&type=${chat.type}`;
        div.className = "item flex p-4 border-b";
        div.dataset.type = chat.type;

        div.innerHTML = `
          <div class="flex-1">
            <div class="font-bold">${chat.name}</div>
            <div class="text-sm text-gray-500">
              ${chat.last_message || "대화 없음"}
            </div>
          </div>

          ${
            chat.unread > 0
              ? `<div class="text-xs bg-green-500 text-white px-2 rounded-full">
                  ${chat.unread}
                 </div>`
              : ""
          }
        `;

        list.appendChild(div);
      });
    });
}

/* -------------------------
   탭 필터
------------------------- */
document.querySelectorAll(".tab").forEach(btn => {
  btn.onclick = () => {
    const type = btn.dataset.type;

    document.querySelectorAll(".item").forEach(el => {
      if (type === "all") el.style.display = "flex";
      else el.style.display =
        el.dataset.type === type ? "flex" : "none";
    });
  };
});

/* -------------------------
   최초 + 자동 갱신
------------------------- */
loadChatList();
setInterval(loadChatList, 2000);

</script>

</body>
</html>
