<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채팅 목록</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#22c55e',
            background: '#fafafa',
            foreground: '#171717',
            muted: '#f5f5f5',
            border: '#e5e5e5'
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: sans-serif; }
  </style>
</head>

<body class="bg-background">

<div class="max-w-2xl mx-auto bg-white min-h-screen">

  <!-- 탭 -->
  <div class="flex border-b">
    <button class="tab px-4 py-3" data-type="all">전체</button>
    <button class="tab px-4 py-3" data-type="market">중고</button>
    <button class="tab px-4 py-3" data-type="club">동아리</button>
  </div>

  <!-- 리스트 -->
  <div id="list">

    <!-- 1 -->
    <a href="chat_id.html?room_id=1&type=market"
       data-type="market"
       class="item flex p-4 border-b">
      <div class="flex-1">
        <div class="font-bold">김철수</div>
        <div id="last-1" class="text-sm text-gray-500"></div>
      </div>
      <div id="unread-1" class="text-xs bg-green-500 text-white px-2 rounded-full"></div>
    </a>

    <!-- 2 -->
    <a href="chat_id.html?room_id=2&type=market"
       data-type="market"
       class="item flex p-4 border-b">
      <div class="flex-1">
        <div class="font-bold">이영희</div>
        <div id="last-2" class="text-sm text-gray-500"></div>
      </div>
      <div id="unread-2" class="text-xs bg-green-500 text-white px-2 rounded-full"></div>
    </a>

    <!-- 3 -->
    <a href="chat_id.html?room_id=3&type=club"
       data-type="club"
       class="item flex p-4 border-b">
      <div class="flex-1">
        <div class="font-bold">러닝크루</div>
        <div id="last-3" class="text-sm text-gray-500"></div>
      </div>
      <div id="unread-3" class="text-xs bg-green-500 text-white px-2 rounded-full"></div>
    </a>

  </div>
</div>

<script>
/* -------------------------
   데이터 함수
------------------------- */
function getLast(roomId) {
  const data = JSON.parse(localStorage.getItem("chat_" + roomId)) || [];
  return data.length ? data[data.length - 1].text : "대화 없음";
}

function getUnread(roomId) {
  return Number(localStorage.getItem("chat_" + roomId + "_unread") || 0);
}

/* -------------------------
   UI 업데이트
------------------------- */
function updateUI() {
  [1,2,3].forEach(id => {

    const last = document.getElementById("last-" + id);
    if (last) last.textContent = getLast(id);

    const unread = document.getElementById("unread-" + id);
    const count = getUnread(id);

    if (unread) {
      unread.textContent = count > 0 ? count : "";
      unread.style.display = count > 0 ? "inline-block" : "none";
    }
  });
}

/* -------------------------
   탭 필터
------------------------- */
document.querySelectorAll(".tab").forEach(btn => {
  btn.onclick = () => {
    const type = btn.dataset.type;

    document.querySelectorAll(".item").forEach(el => {
      if (type === "all") el.style.display = "flex";
      else el.style.display =
        el.dataset.type === type ? "flex" : "none";
    });
  };
});

/* -------------------------
   최초 실행
------------------------- */
document.addEventListener("DOMContentLoaded", updateUI);

/* -------------------------
   자동 갱신 (핵심)
------------------------- */
setInterval(updateUI, 1000);

</script>

</body>
</html>
