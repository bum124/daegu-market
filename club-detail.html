<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동아리 상세 - 대구마켓</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#22c55e",
            foreground: "#171717",
            background: "#fafafa",
            muted: "#f5f5f5",
            "muted-foreground": "#737373",
            card: "#ffffff",
            border: "#e5e5e5"
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-background text-foreground antialiased">

  <header class="sticky top-0 z-40 flex h-14 items-center justify-between border-b border-border bg-white/95 px-4 backdrop-blur md:hidden">
    <a href="club-main.html" class="flex h-10 w-10 items-center justify-center rounded-lg border border-border bg-white text-muted-foreground hover:bg-muted hover:text-foreground" aria-label="뒤로가기">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
      </svg>
    </a>
    <div class="flex gap-1">
      <button class="flex h-10 w-10 items-center justify-center rounded-lg hover:bg-muted">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
        </svg>
      </button>
    </div>
  </header>

  <header class="hidden md:block sticky top-0 z-50 border-b border-border bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4">
      <a href="club-main.html" class="flex items-center gap-2">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary">
          <span class="text-lg font-bold text-white">DM</span>
        </div>
        <span class="text-xl font-bold">대구마켓</span>
      </a>
      <nav class="flex items-center gap-2">
        <a href="club-main.html" class="inline-flex items-center justify-center rounded-lg border border-green-200 bg-green-50 px-4 py-2 text-sm font-semibold text-green-700 hover:bg-green-100 transition-colors">동아리 홈</a>
        <a href="club-board.html" class="inline-flex items-center justify-center rounded-lg border border-border bg-white px-4 py-2 text-sm font-medium hover:bg-muted">캠퍼스 소식통</a>
        <a href="index.html" class="inline-flex items-center justify-center rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white hover:bg-green-600">중고장터</a>
      </nav>
    </div>
  </header>

  <main class="pb-28 md:pb-8">
    <div class="mx-auto max-w-6xl md:px-4 md:py-6">
      <div class="md:grid md:grid-cols-2 md:gap-8">

        <div class="relative aspect-square bg-muted md:rounded-2xl md:overflow-hidden">
          <img id="mainImage" src="" alt="동아리 배너" class="h-full w-full object-cover">
        </div>

        <div class="px-4 pt-4 md:px-0 md:pt-0">
          <div class="flex items-center justify-between border-b border-border pb-4">
            <div class="flex items-center gap-3">
              <div class="h-12 w-12 overflow-hidden rounded-full border border-border bg-white">
                <img id="clubLogo" src="https://api.dicebear.com/8.x/thumbs/svg?seed=DM" alt="동아리 로고" class="h-full w-full object-cover">
              </div>
              <div class="min-w-0">
                <p id="clubCollege" class="text-sm font-medium text-foreground">대구대학교</p>
                <p id="clubTagline" class="mt-0.5 line-clamp-1 text-sm text-muted-foreground">태그라인</p>
              </div>
            </div>
            <a href="club-board.html" class="rounded-lg border border-border bg-white px-4 py-2 text-sm font-medium hover:bg-muted">소식 더보기</a>
          </div>

          <div class="border-b border-border py-4">
            <div class="flex flex-wrap items-center gap-2">
              <span id="recruitStatus" class="inline-flex items-center rounded-full bg-green-50 px-2.5 py-1 text-xs font-semibold text-green-700">모집 중</span>
              <span id="clubCategory" class="inline-flex items-center rounded-full border border-border bg-white px-2.5 py-1 text-xs font-medium text-muted-foreground">카테고리</span>
            </div>

            <div class="mt-3"><h1 id="clubName" class="text-xl font-bold text-foreground md:text-2xl">동아리 이름</h1></div>

            <div class="mt-4 flex flex-wrap gap-4 text-sm text-muted-foreground">
              <div class="flex items-center gap-1">📍 <span id="clubLocation">장소</span></div>
              <div class="flex items-center gap-1">🕒 <span id="clubMeet">시간</span></div>
            </div>
          </div>

          <div class="border-b border-border py-4">
            <h2 class="mb-3 font-semibold text-foreground">동아리 상세</h2>
            <div class="space-y-4">
              <div class="rounded-xl border border-border bg-white p-4">
                <p class="text-sm font-semibold">동아리 소개</p>
                <p id="intro" class="mt-2 whitespace-pre-wrap text-sm leading-relaxed text-muted-foreground">소개글</p>
              </div>
              <div class="rounded-xl border border-border bg-white p-4">
                <p class="text-sm font-semibold">정기 모임 정보</p>
                <p id="meetingInfo" class="mt-2 whitespace-pre-wrap text-sm leading-relaxed text-muted-foreground">모임 상세</p>
              </div>
              <div class="rounded-xl border border-border bg-white p-4">
                <p class="text-sm font-semibold">회비 및 지원 자격</p>
                <p id="feeInfo" class="mt-2 whitespace-pre-wrap text-sm leading-relaxed text-muted-foreground">회비 상세</p>
              </div>
            </div>
          </div>

          <section class="py-4">
            <div class="mb-3 flex items-end justify-between gap-3">
              <div>
                <h2 class="text-lg font-semibold text-foreground">최근 우리 동아리 소식</h2>
              </div>
              <a href="club-board.html" class="text-sm font-semibold text-primary hover:underline">전체 보기</a>
            </div>
            
            <div id="recentClubPosts" class="space-y-3">
              <p class="text-sm text-muted-foreground p-4 text-center">소식을 불러오는 중입니다...</p>
            </div>
          </section>

          <div class="hidden gap-3 py-4 md:flex">
            <button type="button" onclick="contactPresident()" class="inline-flex items-center justify-center rounded-lg border border-border bg-white px-6 py-3 text-sm font-semibold hover:bg-muted transition-colors">
              회장에게 문의하기
            </button>
            <button type="button" onclick="applyToClub()" class="flex-1 inline-flex items-center justify-center rounded-lg bg-primary px-8 py-4 text-base font-bold text-white shadow-sm hover:bg-green-600 transition-colors">
              가입 신청하기
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 z-50 border-t border-border bg-white p-4 md:hidden">
    <div class="flex gap-3">
      <button type="button" onclick="contactPresident()" class="inline-flex items-center justify-center rounded-lg border border-border bg-white px-5 py-3 text-sm font-semibold hover:bg-muted transition-colors">
        회장에게 문의
      </button>
      <button type="button" onclick="applyToClub()" class="flex-1 inline-flex items-center justify-center rounded-lg bg-primary px-6 py-3 text-base font-bold text-white shadow-sm hover:bg-green-600 transition-colors">
        가입 신청하기
      </button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const clubId = urlParams.get('id');
    const API_BASE_URL = "https://daegu-market-api.onrender.com";

    // 시간 계산 마법사
    function getTimeAgo(dateString) {
      const now = new Date();
      const past = new Date(dateString);
      const diffMs = now - past;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 60) return `${diffMins || 1}분 전`;
      if (diffHours < 24) return `${diffHours}시간 전`;
      return `${diffDays}일 전`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!clubId) {
        alert('잘못된 접근입니다.');
        window.location.href = 'club-main.html';
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/api/clubs/${clubId}`);
        if (!response.ok) throw new Error('동아리 정보를 불러오는데 실패했습니다.');

        const club = await response.json();

        // 1. 기본 정보 꽂아넣기
        document.getElementById('clubCategory').textContent = club.category;
        document.getElementById('clubName').textContent = club.name;
        document.getElementById('clubTagline').textContent = club.tagline;
        document.getElementById('clubMeet').textContent = club.meet_time;
        document.getElementById('clubLocation').textContent = club.location;
        document.getElementById('intro').innerHTML = club.intro.replace(/\n/g, '<br>');
        document.getElementById('meetingInfo').innerHTML = club.meeting_info ? club.meeting_info.replace(/\n/g, '<br>') : '상세 정보 없음';
        
        const feeAmountText = club.fee_amount ? `- 회비: 월 ${club.fee_amount.toLocaleString()}원\n` : '- 회비: 없음\n';
        const feeDetailText = club.fee_info ? `${club.fee_info}\n` : '';
        const eligibilityText = club.eligibility ? `\n[지원 자격 & 추천]\n${club.eligibility}` : '';
        document.getElementById('feeInfo').innerHTML = (feeAmountText + feeDetailText + eligibilityText).replace(/\n/g, '<br>');

       // 2. 📸 [수정] 동아리 대표 사진 및 로고 출력 (DB에 저장된 진짜 사진 처리)
        if (club.images) {
          // DB에서 문자열(String)로 넘어온 이미지를 다시 JavaScript 배열로 변환합니다.
          const parsedImages = typeof club.images === 'string' ? JSON.parse(club.images) : club.images;
          
          if (parsedImages && parsedImages.length > 0) {
            // 사용자가 등록한 사진이 있으면 메인 배너와 로고에 첫 번째 사진을 꽂아줍니다.
            document.getElementById('mainImage').src = parsedImages[0];
            document.getElementById('clubLogo').src = parsedImages[0];
          } else {
            // 이미지가 비어있다면 기존의 예쁜 더미 패턴을 띄웁니다.
            document.getElementById('mainImage').src = `https://api.dicebear.com/8.x/shapes/svg?seed=clubBanner${club.club_id}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
            document.getElementById('clubLogo').src = `https://api.dicebear.com/8.x/initials/svg?seed=${club.name}&backgroundColor=22c55e`;
          }
        } else {
          // images 컬럼 자체가 null이거나 없을 때의 예외 처리
          document.getElementById('mainImage').src = `https://api.dicebear.com/8.x/shapes/svg?seed=clubBanner${club.club_id}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
          document.getElementById('clubLogo').src = `https://api.dicebear.com/8.x/initials/svg?seed=${club.name}&backgroundColor=22c55e`;
        }

        // 3. ✨ 진짜 소식글 불러오기 실행!
        loadRecentPosts();

      } catch (error) {
        console.error(error);
        alert(error.message);
        window.location.href = 'club-main.html';
      }
    });

    // 🌟 [핵심 기능] 이 동아리의 최근 소식을 서버에서 가져와 그리기!
    async function loadRecentPosts() {
      const container = document.getElementById('recentClubPosts');
      try {
        const res = await fetch(`${API_BASE_URL}/api/club-posts`);
        const allPosts = await res.json();
        
        // 전체 소식 중 이 동아리(clubId)가 쓴 글만 최신순으로 3개 가져옵니다.
        const clubPosts = allPosts.filter(p => p.club_id == clubId).slice(0, 3);

        if(clubPosts.length === 0) {
          container.innerHTML = '<div class="rounded-xl border border-dashed border-border bg-background p-4 text-center text-sm text-muted-foreground">아직 등록된 소식이 없습니다.</div>';
          return;
        }

        container.innerHTML = clubPosts.map(post => {
          // 글에 이미지가 첨부되어 있으면 예쁜 썸네일(작은 사진)로 띄워줍니다!
          let imgHtml = '';
          if(post.images && post.images.length > 0) {
            imgHtml = `<img src="${post.images[0]}" class="h-16 w-16 object-cover rounded-lg border border-border flex-shrink-0 shadow-sm">`;
          }

          return `
          <a href="club-post-detail.html?id=${post.post_id}" class="group block rounded-xl border border-border bg-white p-4 hover:bg-muted transition-colors shadow-sm">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <p class="line-clamp-1 text-sm font-semibold">${post.title}</p>
                <p class="mt-1 line-clamp-2 text-sm text-muted-foreground">${post.content}</p>
              </div>
              ${imgHtml} 
            </div>
            <div class="mt-3 flex items-center justify-between text-xs text-muted-foreground border-t border-border pt-3">
              <span class="rounded-full bg-green-50 px-2.5 py-0.5 font-semibold text-green-700">${post.category}</span>
              <div class="flex gap-3">
                <span>조회 ${post.views || 0}</span>
                <span>${getTimeAgo(post.created_at)}</span>
              </div>
            </div>
          </a>
          `;
        }).join('');
      } catch(e) {
        container.innerHTML = '<div class="p-4 text-center text-sm text-red-500">소식을 불러오지 못했습니다.</div>';
      }
    }

    function contactPresident() {
      alert('회장에게 채팅을 보냅니다.');
    }

    // 진짜 가입 신청 함수
    async function applyToClub() {
      let user = null;
      try { user = JSON.parse(localStorage.getItem('loggedInUser')); } catch(e){}
      
      if (!user) {
        alert('로그인 후 가입 신청이 가능합니다!');
        window.location.href = 'login.html';
        return;
      }

      const userId = user.user_id || user.id || user.student_id;
      
      if (!confirm('이 동아리에 가입 신청을 하시겠습니까?')) return; 

      try {
        const response = await fetch(`${API_BASE_URL}/api/clubs/${clubId}/apply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: userId })
        });
        
        const result = await response.json();
        
        if (response.ok) {
          alert(result.message);
        } else {
          alert(result.message || '가입 신청에 실패했습니다.');
        }
      } catch (error) {
        alert('서버와 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
      }
    }
  </script>
</body>
</html>
