  <script>
    // Image Gallery
    
    window.images = window.images || [];
    window.currentIndex = 0;
    window.currentProductTitle = '대구대 마켓 상품';
    window.currentSeller = null;

    function updateImage() {
      if (!window.images.length) {
        return;
      }

      document.getElementById('mainImage').src = window.images[window.currentIndex];
      
      // Update dots
      const dots = document.getElementById('imageDots').children;
      for (let i = 0; i < dots.length; i++) {
        if (i === window.currentIndex) {
          dots[i].className = 'h-2 w-2 rounded-full bg-primary';
        } else {
          dots[i].className = 'h-2 w-2 rounded-full bg-white/60';
        }
      }
    }

    function prevImage() {
      if (!window.images.length) {
        return;
      }

      window.currentIndex = window.currentIndex === 0 ? window.images.length - 1 : window.currentIndex - 1;
      updateImage();
    }

    function nextImage() {
      if (!window.images.length) {
        return;
      }

      window.currentIndex = window.currentIndex === window.images.length - 1 ? 0 : window.currentIndex + 1;
      updateImage();
    }

    function goToImage(index) {
      window.currentIndex = index;
      updateImage();
    }

    // Like functionality
    let isLiked = false;

    function syncLikeButton() {
      const mobileIcon = document.getElementById('mobileHeartIcon');
      const desktopIcon = document.getElementById('desktopHeartIcon');
      const desktopText = document.getElementById('desktopLikeText');
      const mobileBtn = document.getElementById('mobileLikeBtn');
      const desktopBtn = document.getElementById('desktopLikeBtn');

      if (isLiked) {
        mobileIcon.setAttribute('fill', '#ef4444');
        mobileIcon.setAttribute('stroke', '#ef4444');
        desktopIcon.setAttribute('fill', '#ef4444');
        desktopIcon.setAttribute('stroke', '#ef4444');
        desktopText.textContent = '관심 해제';
        mobileBtn.classList.add('text-red-500', 'border-red-500');
        desktopBtn.classList.add('text-red-500', 'border-red-500');
      } else {
        mobileIcon.setAttribute('fill', 'none');
        mobileIcon.setAttribute('stroke', 'currentColor');
        desktopIcon.setAttribute('fill', 'none');
        desktopIcon.setAttribute('stroke', 'currentColor');
        desktopText.textContent = '관심 등록';
        mobileBtn.classList.remove('text-red-500', 'border-red-500');
        desktopBtn.classList.remove('text-red-500', 'border-red-500');
      }
    }

    async function toggleLike() {
      const user = getLoggedInUser();
      const userId = await resolveUserId(user);

      if (!userId) {
        alert('로그인이 필요한 서비스입니다.');
        window.location.href = 'login.html';
        return;
      }

      const nextLiked = !isLiked;
      const response = await fetch(`https://daegu-market-api.onrender.com/api/products/${id}/like`, {
        method: nextLiked ? 'POST' : 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userId,
          user_email: user && user.email
        })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({}));
        alert(result.message || '관심 등록 처리에 실패했습니다.');
        return;
      }

      const likesElement = document.getElementById('likes');
      const currentLikes = Number(likesElement.innerText || 0);
      isLiked = nextLiked;
      likesElement.innerText = Math.max(0, currentLikes + (isLiked ? 1 : -1));
      syncLikeButton();
    }
    // Share functionality
    async function handleShare() {
      if (navigator.share) {
        await navigator.share({
          title: window.currentProductTitle,
          text: '대구대 마켓에서 판매중인 상품입니다.',
          url: window.location.href
        });
      } else {
        await navigator.clipboard.writeText(window.location.href);
        alert('링크가 복사되었습니다.');
      }
    }
  </script>

<script>

function getTimeAgo(dateString) {
  const now = new Date();
  const past = new Date(dateString);
  const diff = Math.floor((now - past) / 1000);

  if (diff < 60) return '방금 전';

  const minutes = Math.floor(diff / 60);
  if (minutes < 60) return minutes + '분 전';

  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + '시간 전';

  const days = Math.floor(hours / 24);
  return days + '일 전';
}

function parseImages(images) {
  if (Array.isArray(images)) {
    return images;
  }

  if (typeof images !== 'string' || !images.trim()) {
    return [];
  }

  try {
    const parsed = JSON.parse(images);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [images];
  }
}

function formatPrice(price) {
  return Number(price || 0).toLocaleString('ko-KR') + '원';
}

function getLoggedInUser() {
  try {
    return JSON.parse(localStorage.getItem('loggedInUser') || 'null');
  } catch (error) {
    return null;
  }
}

async function resolveUserId(user) {
  if (!user) {
    return null;
  }

  if (user.user_id || user.id) {
    return user.user_id || user.id;
  }

  if (!user.email) {
    return null;
  }

  const response = await fetch('https://daegu-market-api.onrender.com/api/users');

  if (!response.ok) {
    return null;
  }

  const users = await response.json();
  const matchedUser = users.find(item => item.email === user.email);

  return matchedUser ? matchedUser.user_id : null;
}

async function updateOwnerActions() {
  const user = getLoggedInUser();
  const currentUserId = await resolveUserId(user);
  const sellerId = window.currentSeller && window.currentSeller.id;
  const isOwner = currentUserId && sellerId && String(currentUserId) === String(sellerId);

  document.querySelectorAll('.owner-action').forEach(button => {
    button.classList.toggle('hidden', !isOwner);
  });
}

async function loadLikeState() {
  const user = getLoggedInUser();
  const userId = await resolveUserId(user);

  if (!userId || !id) {
    isLiked = false;
    syncLikeButton();
    return;
  }

  const response = await fetch(`https://daegu-market-api.onrender.com/api/products/${id}/like?user_id=${encodeURIComponent(userId)}`);

  if (!response.ok) {
    return;
  }

  const data = await response.json();
  isLiked = Boolean(data.liked);
  syncLikeButton();
}

function openSellerProfile() {
  const seller = window.currentSeller;

  if (!seller || !seller.id) {
    alert('판매자 정보를 아직 불러오는 중입니다.');
    return;
  }
  window.location.href = `profile.html?userId=${encodeURIComponent(seller.id)}`;
}

document.getElementById('profileButton').addEventListener('click', openSellerProfile);

async function deleteProduct() {
  const seller = window.currentSeller;
  const user = getLoggedInUser();
  const sellerId = await resolveUserId(user);

  if (!seller || !seller.id || !sellerId || String(seller.id) !== String(sellerId)) {
    alert('본인이 등록한 상품만 삭제할 수 있습니다.');
    return;
  }

  if (!confirm('이 상품을 삭제할까요?')) {
    return;
  }

  const response = await fetch(`https://daegu-market-api.onrender.com/api/products/${id}`, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      seller_id: sellerId,
      seller_email: user && user.email
    })
  });

  const result = await response.json().catch(() => ({}));

  if (!response.ok) {
    alert(result.message || '상품 삭제에 실패했습니다.');
    return;
  }

  alert(result.message || '상품이 삭제되었습니다.');
  window.location.href = 'mypage.html';
}

const params = new URLSearchParams(location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('title').innerText = '상품을 찾을 수 없습니다.';
  document.getElementById('description').innerText = '상품 ID가 없습니다. 메인 페이지에서 상품을 다시 선택해주세요.';
} else {
  fetch(`https://daegu-market-api.onrender.com/api/products/${id}/views`, {
    method: 'PUT'
  });

  fetch(`https://daegu-market-api.onrender.com/api/products/${id}`)
  .then(res => res.json())
  .then(item => {

    console.log(item);

    if (!item) {
      document.getElementById('title').innerText = '상품을 찾을 수 없습니다.';
      document.getElementById('description').innerText = '삭제되었거나 존재하지 않는 상품입니다.';
      return;
    }

    const images = parseImages(item.images);
    const fallbackImage = 'https://via.placeholder.com/800x800?text=Product';

    // 전역 갤러리 상태 세팅
    window.images = images.length ? images : [fallbackImage];
    window.currentIndex = 0;
    window.currentProductTitle = item.title || '대구대 마켓 상품';

    document.title = `${window.currentProductTitle} - 대구대 마켓`;

    // dot 생성
    const dotsContainer = document.getElementById('imageDots');
    dotsContainer.innerHTML = '';

    window.images.forEach((_, index) => {
      const dot = document.createElement('button');

      dot.className = index === 0 ? 'h-2 w-2 rounded-full bg-primary' : 'h-2 w-2 rounded-full bg-white/60';
      dot.onclick = () => goToImage(index);

      dotsContainer.appendChild(dot);
    });

    // 첫 이미지 표시
    document.getElementById('mainImage').src = window.images[0];
    document.getElementById('mainImage').alt = window.currentProductTitle;

    // 상품 정보
    document.getElementById('title').innerText = item.title || '제목 없음';
    document.getElementById('price').innerText = formatPrice(item.price);
    document.getElementById('condition').innerText = item.condition || item.status || '판매중';
    document.getElementById('category').innerText = item.category || '기타';
    document.getElementById('description').innerText = item.description || '등록된 상품 설명이 없습니다.';
    document.getElementById('location').innerText = item.location || '위치 미정';
    document.getElementById('views').innerText = Number(item.views || 0);
    document.getElementById('likes').innerText = Number(item.likes || 0);
    const sellerName = item.seller_nickname || item.seller_name || item.seller || (item.seller_id ? `판매자 ${item.seller_id}` : '판매자');
    const sellerDepartment = item.seller_department || item.department || item.college || '판매자 정보 미제공';

    window.currentSeller = {
      id: item.seller_id || null,
      name: sellerName,
      department: sellerDepartment
    };

    document.getElementById('sellerName').innerText = sellerName;
    document.getElementById('sellerDepartment').innerText = sellerDepartment;
    updateOwnerActions();
    loadLikeState();

    // 시간 표시
    document.getElementById('createdAt').innerText = getTimeAgo(item.created_at || item.createdAt);

  })
  .catch(error => {
    console.error('상품 상세 로딩 실패:', error);
    document.getElementById('title').innerText = '상품 정보를 불러오지 못했습니다.';
    document.getElementById('description').innerText = '잠시 후 다시 시도해주세요.';
  });
}

</script>
