  <script>
    // Image Gallery
    
    window.images = window.images || [];
    window.currentIndex = 0;
    window.currentProductTitle = '대구대 마켓 상품';
    window.currentSeller = null;
    window.currentProductStatus = '판매중';
    const API_TIMEOUT_MS = 12000;

    async function fetchWithTimeout(url, options = {}, timeoutMs = API_TIMEOUT_MS) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal
        });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function updateImage() {
      if (!window.images.length) {
        return;
      }

      document.getElementById('mainImage').src = window.images[window.currentIndex];
      
      // Update dots
      const dots = document.getElementById('imageDots').children;
      for (let i = 0; i < dots.length; i++) {
        if (i === window.currentIndex) {
          dots[i].className = 'h-2 w-2 rounded-full bg-primary';

<script>

function getTimeAgo(dateString) {
  const now = new Date();
  const past = new Date(dateString);
  const diff = Math.floor((now - past) / 1000);

  if (diff < 60) return '방금 전';

  const minutes = Math.floor(diff / 60);
  if (minutes < 60) return minutes + '분 전';

  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + '시간 전';

  const days = Math.floor(hours / 24);
  return days + '일 전';
}

function parseImages(images) {
  if (Array.isArray(images)) {
    return images;
  }

  if (typeof images !== 'string' || !images.trim()) {
    return [];
  }

  try {
    const parsed = JSON.parse(images);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [images];
  }
}

function formatPrice(price) {
  return Number(price || 0).toLocaleString('ko-KR') + '원';
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

// 상품 상세에 들어온 상품 ID를 최근 본 상품 목록으로 localStorage에 저장합니다.
function saveRecentProduct(productId) {
  if (!productId) {
    return;
  }

  const key = 'recentViewedProducts';

  try {
    const recentIds = JSON.parse(localStorage.getItem(key) || '[]');
    const nextIds = [
      String(productId),
      ...recentIds.map(String).filter(id => id && id !== String(productId))
    ].slice(0, 20);

    localStorage.setItem(key, JSON.stringify(nextIds));
  } catch (error) {
    localStorage.setItem(key, JSON.stringify([String(productId)]));
  }
}

function getRelatedSection() {
  return document.querySelector('main section.mt-8');
}

function resetRelatedProducts() {
  const section = getRelatedSection();

  if (!section) {
    return null;
  }

  section.classList.add('hidden');
  section.innerHTML = `
    <h2 class="mb-4 text-lg font-semibold text-gray-900">관련 상품</h2>
    <div id="relatedProducts" class="grid grid-cols-2 gap-4 md:grid-cols-4"></div>
  `;

  return section;
}

function normalizeStatus(value) {
  const status = String(value || '판매중').trim();

  if (status.includes('판매완료')) {
    return '판매완료';
  }

  if (status.includes('예약')) {
    return '예약중';
  }

  return '판매중';
}

function isSoldProduct(product) {
  return normalizeStatus(product.status || product.condition) === '판매완료';
}

const KAKAO_MAP_APP_KEY = window.KAKAO_MAP_APP_KEY || '';
let kakaoMapLoader;

// 카카오 지도 SDK를 필요한 순간에 불러옵니다. 실제 운영 전 JavaScript 키를 넣어야 합니다.
function loadKakaoMapSdk() {
  if (window.kakao && window.kakao.maps) {
    return new Promise(resolve => window.kakao.maps.load(resolve));
  }

  if (!KAKAO_MAP_APP_KEY) {
    return Promise.reject(new Error('카카오 지도 JavaScript 키가 설정되지 않았습니다.'));
  }

  if (!kakaoMapLoader) {
    kakaoMapLoader = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${encodeURIComponent(KAKAO_MAP_APP_KEY)}&autoload=false`;
      script.async = true;
      script.onload = () => window.kakao.maps.load(resolve);
      script.onerror = () => reject(new Error('카카오 지도를 불러오지 못했습니다.'));
      document.head.appendChild(script);
    });
  }

  return kakaoMapLoader;
}

// 상품에 좌표가 있으면 카카오 지도로 거래 희망 장소를 표시합니다.
function renderTradeMap(locationName, lat, lng) {
  const section = document.getElementById('tradeMapSection');
  const label = document.getElementById('tradeMapLabel');
  const hasCoordinate = lat && lng;

  if (!hasCoordinate || !locationName || locationName.includes('기타')) {
    section.classList.add('hidden');
    return;
  }

  label.textContent = locationName;
  section.classList.remove('hidden');

  loadKakaoMapSdk()
    .then(() => {
      const coordinate = new kakao.maps.LatLng(Number(lat), Number(lng));
      const map = new kakao.maps.Map(document.getElementById('tradeMap'), {
        center: coordinate,
        level: 2,
        draggable: false,
        scrollwheel: false,
        disableDoubleClickZoom: true
      });
      const marker = new kakao.maps.Marker({ position: coordinate });
      marker.setMap(map);
      setTimeout(() => map.relayout(), 0);
    })
    .catch(error => {
      console.warn('카카오 지도 렌더링 실패:', error);
      document.getElementById('tradeMap').innerHTML = '<div class="flex h-full items-center justify-center px-4 text-center text-sm text-gray-500">카카오 지도 API 키 설정 후 거래 장소 지도가 표시됩니다.</div>';
    });
}

function createRelatedProductCard(product) {
  const images = parseImages(product.images);
  const title = product.title || '제목 없음';
  const image = product.image || product.image_url || images[0] || 'https://via.placeholder.com/400x400?text=Product';
  const status = normalizeStatus(product.status || product.condition);
  const sold = status === '판매완료';

  return `
    <a href="product.html?id=${encodeURIComponent(product.id)}" class="group block overflow-hidden rounded-xl border border-gray-200 bg-white ${sold ? 'opacity-80' : ''}">
      <div class="relative aspect-square bg-gray-100">
        <img src="${escapeHtml(image)}" alt="${escapeHtml(title)}" class="h-full w-full object-cover transition-transform ${sold ? 'grayscale opacity-45' : 'group-hover:scale-105'}">
        ${sold ? '<div class="absolute inset-0 bg-white/50"></div><div class="absolute inset-0 flex items-center justify-center"><span class="rounded-full bg-slate-900/80 px-3 py-1.5 text-xs font-semibold text-white">판매완료</span></div>' : ''}
        <span class="absolute left-2 top-2 rounded-full px-2 py-1 text-xs font-medium ${sold ? 'bg-slate-900/80 text-white' : 'bg-white/90 text-gray-700'}">${escapeHtml(status)}</span>

        <p class="line-clamp-1 text-sm font-medium text-gray-900">${escapeHtml(title)}</p>
        <p class="mt-1 font-bold text-gray-900">${formatPrice(product.price)}</p>
      </div>

  `;
}

// 같은 카테고리와 관련 단과대를 기준으로 실제 데이터에서 관련 상품을 가져옵니다.
async function loadRelatedProducts(currentProduct) {
  const section = resetRelatedProducts();

  if (!section || !currentProduct || !currentProduct.category) {
    return;
  }

  try {
    const response = await fetchWithTimeout('https://daegu-market-api.onrender.com/api/products');

    if (!response.ok) {
      return;
    }

    const products = await response.json();
    const relatedProducts = products
      .filter(product => String(product.id) !== String(currentProduct.id))
      .filter(product => product.category === currentProduct.category)
      .filter(product => !currentProduct.target_college || !product.target_college || product.target_college === currentProduct.target_college)
      .sort((a, b) => Number(isSoldProduct(a)) - Number(isSoldProduct(b)) || new Date(b.created_at || b.createdAt || 0) - new Date(a.created_at || a.createdAt || 0))
      .slice(0, 4);

    if (!relatedProducts.length) {
      return;
    }

    document.getElementById('relatedProducts').innerHTML = relatedProducts.map(createRelatedProductCard).join('');
    section.classList.remove('hidden');
  } catch (error) {
    console.warn('관련 상품 로딩 실패:', error);
  }
}

function getLoggedInUser() {
  try {
    return JSON.parse(localStorage.getItem('loggedInUser') || 'null');
  } catch (error) {
    return null;
  }
}

function redirectToLogin(targetUrl) {
  window.location.href = `login.html?next=${encodeURIComponent(targetUrl || window.location.href)}`;
}

async function resolveUserId(user) {
  if (!user) {
    return null;
  }

  if (user.user_id || user.id) {
    return user.user_id || user.id;
  }

  if (!user.email) {
    return null;
  }

  const response = await fetch('https://daegu-market-api.onrender.com/api/users');

  if (!response.ok) {
    return null;
  }

  const users = await response.json();
  const matchedUser = users.find(item => item.email === user.email);

  return matchedUser ? matchedUser.user_id : null;
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');

    ? 'border-red-200 text-red-700'
    : 'border-green-200 text-green-700';

  toast.className = `fixed right-4 top-4 z-[70] rounded-lg border bg-white px-4 py-3 text-sm font-medium shadow-lg ${tone}`;
  toast.textContent = message;
  toast.classList.remove('hidden');
  clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(() => toast.classList.add('hidden'), 2600);
}

    window.images = images.length ? images : [fallbackImage];
    window.currentIndex = 0;
    window.currentProductTitle = item.title || '대구대 마켓 상품';
    saveRecentProduct(item.id || id);

    document.title = `${window.currentProductTitle} - 대구대 마켓`;

    // dot 생성
    const dotsContainer = document.getElementById('imageDots');
    dotsContainer.innerHTML = '';

    window.images.forEach((_, index) => {
      const dot = document.createElement('button');

      dot.className = index === 0 ? 'h-2 w-2 rounded-full bg-primary' : 'h-2 w-2 rounded-full bg-white/60';
      dot.onclick = () => goToImage(index);

      dotsContainer.appendChild(dot);
    });

    // 첫 이미지 표시
    document.getElementById('mainImage').src = window.images[0];
    document.getElementById('mainImage').alt = window.currentProductTitle;

    // 상품 정보
    document.getElementById('title').innerText = item.title || '제목 없음';
    document.getElementById('price').innerText = formatPrice(item.price);
    window.currentProductStatus = normalizeStatus(item.status || item.condition);
    document.getElementById('condition').innerText = window.currentProductStatus;
    syncProductStatusUi();
    document.getElementById('category').innerText = item.category || '기타';
    const targetCollege = [item.target_college, item.target_department].filter(Boolean).join(' · ');
    const targetCollegeBadge = document.getElementById('targetCollege');
    targetCollegeBadge.innerText = targetCollege ? `관련 ${targetCollege}` : '';
    targetCollegeBadge.classList.toggle('hidden', !targetCollege);
    document.getElementById('description').innerText = item.description || '등록된 상품 설명이 없습니다.';
    document.getElementById('location').innerText = item.location || '위치 미정';
    renderTradeMap(item.location, item.location_lat, item.location_lng);
    document.getElementById('views').innerText = Number(item.views || 0);
    document.getElementById('likes').innerText = Number(item.likes || 0);
    const sellerName = item.seller_nickname || item.seller_name || item.seller || (item.seller_id ? `판매자 ${item.seller_id}` : '판매자');
    const sellerDepartment = [item.seller_college, item.seller_department || item.department].filter(Boolean).join(' · ') || item.college || '판매자 정보 미제공';

    window.currentSeller = {
      id: item.seller_id || null,
      name: sellerName,
      department: sellerDepartment
    };

    document.getElementById('sellerName').innerText = sellerName;
    document.getElementById('sellerDepartment').innerText = sellerDepartment;

    updateOwnerActions();
    loadLikeState();

    // 시간 표시
    document.getElementById('createdAt').innerText = getTimeAgo(item.created_at || item.createdAt);
    loadRelatedProducts(item);

  })
  .catch(error => {
    console.error('상품 상세 로딩 실패:', error);
    document.getElementById('title').innerText = '상품 정보를 불러오지 못했습니다.';
    document.getElementById('description').innerText = '잠시 후 다시 시도해주세요.';
  });
}

</script>
</body>
</html>
